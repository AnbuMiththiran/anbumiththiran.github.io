<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anbudan Miththiran - Updates</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>Anbudan Miththiran - Updates</h1>
            <p class="subtitle">Stay up-to-date with my latest projects and announcements.</p>
        </div>
    </header>

    <main class="container">
        <section id="book-releases" class="update-section">
            <h2>Book Releases</h2>
            <div class="update-grid" id="bookReleasesGrid">
                <!-- Book release cards will be injected here by JavaScript -->
            </div>
        </section>

        <section id="audiobooks" class="update-section">
            <h2>Audiobooks</h2>
            <div class="update-grid" id="audiobooksGrid">
                <!-- Audiobook cards will be injected here by JavaScript -->
            </div>
        </section>

        <section id="youtube-videos" class="update-section">
            <h2>YouTube Videos</h2>
            <div class="update-grid" id="youtubeVideosGrid">
                <!-- YouTube video cards will be injected here by JavaScript -->
            </div>
        </section>

        <section id="announcements" class="update-section">
            <h2>Announcements</h2>
            <div class="update-grid" id="announcementsGrid">
                <!-- Announcement cards will be injected here by JavaScript -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Anbudan Miththiran. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
