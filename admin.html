<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9RLGNJL2ZQ"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-9RLGNJL2ZQ');
    </script>
    
    <title>Admin Login - Anbudan Miththiran</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-dark: #2c3e50;
            --accent-yellow: #ffb703;
            --bg-gradient: linear-gradient(135deg, #fff4e6, #ffd8a8, #ffb703);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--bg-gradient); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }

        .login-container { 
            background: rgba(255, 255, 255, 0.98); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            width: 90%; 
            max-width: 400px; 
            border: 1px solid rgba(255,255,255,0.8);
        }

        h2 { 
            text-align: center; 
            color: var(--primary-dark); 
            margin-bottom: 30px; 
            font-weight: 700;
            font-size: 1.8rem;
        }

        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            border: 2px solid #eee; 
            border-radius: 10px; 
            font-size: 1rem; 
            outline: none;
            transition: border-color 0.3s ease;
            background: #f8f9fa;
        }

        input:focus { border-color: var(--accent-yellow); background: #fff; }

        button { 
            width: 100%; 
            padding: 15px; 
            background-color: var(--primary-dark); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            font-weight: 600; 
            transition: background-color 0.3s, transform 0.2s; 
        }
        
        button:hover { background-color: #1a252f; transform: translateY(-2px); }

        #message { 
            text-align: center; 
            margin-top: 20px; 
            padding: 12px; 
            border-radius: 8px; 
            display: none; 
            font-size: 0.95rem; 
            font-weight: 500;
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        footer { 
            text-align: center; 
            padding: 20px; 
            color: var(--primary-dark); 
            font-weight: 600; 
            width: 100%; 
            position: absolute; 
            bottom: 0; 
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Admin Portal</h2>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button onclick="login()">Secure Login</button>
        <div id="message"></div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            try {
                const response = await fetch('https://premium-backend-8plp.onrender.com/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    messageDiv.innerText = "Login successful! Redirecting...";
                    messageDiv.className = "success";
                    messageDiv.style.display = "block";
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    messageDiv.innerText = data.message || "Invalid credentials";
                    messageDiv.className = "error";
                    messageDiv.style.display = "block";
                }
            } catch (err) {
                messageDiv.innerText = "Error connecting to server";
                messageDiv.className = "error";
                messageDiv.style.display = "block";
            }
        }
    </script>

    <footer>
        &copy; 2026 Anbudan Miththiran
    </footer>
</body>
</html>
