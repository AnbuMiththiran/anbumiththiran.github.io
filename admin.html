<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* --- Base & Typography --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0f172a; /* Sleek dark background */
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* --- Login Card Container --- */
        .login-container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #334155;
        }

        .login-container h2 {
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 1.5rem;
            color: #ffffff;
        }

        /* --- Form Inputs --- */
        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            border-color: #3b82f6; /* Accent blue focus */
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .input-group input::placeholder {
            color: #64748b;
        }

        /* --- Login Button --- */
        button {
            width: 100%;
            padding: 14px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2563eb;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Admin Portal</h2>
        
        <div class="input-group">
            <input id="email" type="email" placeholder="Email Address" autocomplete="email">
        </div>
        
        <div class="input-group">
            <input id="password" type="password" placeholder="Password" autocomplete="current-password">
        </div>
        
        <button id="login-btn" onclick="login()">Login</button>
    </div>

    <script>
        const API = "https://premium-backend-8plp.onrender.com";

        async function login() {
            const emailInput = document.getElementById("email");
            const passwordInput = document.getElementById("password");
            const btn = document.getElementById("login-btn");

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Basic validation
            if (!email || !password) {
                alert("Please enter both email and password.");
                return;
            }

            // UX: Set loading state
            btn.innerText = "Authenticating...";
            btn.disabled = true;

            try {
                const res = await fetch(API + "/admin-login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem("token", data.token);
                    // Slight delay for smooth UX before redirect
                    btn.innerText = "Success 🔥";
                    btn.style.backgroundColor = "#10b981"; // Turn green
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 500);
                } else {
                    alert(data.message || "Login failed. Please check your credentials.");
                }
            } catch (error) {
                console.error("Login Error:", error);
                alert("Server is unreachable. Please try again later.");
            } finally {
                // Reset button state if it failed
                if (btn.innerText !== "Success 🔥") {
                    btn.innerText = "Login";
                    btn.disabled = false;
                }
            }
        }
    </script>
</body>
</html>
