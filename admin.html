<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Anbudan Miththiran</title>
    <style>
        body { background: linear-gradient(135deg, #fff4e6, #ffd8a8, #ffb703); min-height: 100vh; margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-container { background: white; padding: 2.5rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #34495e; }
        #message { text-align: center; margin-top: 15px; padding: 10px; border-radius: 4px; display: none; font-size: 14px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        footer { text-align: center; padding: 20px; margin-top: 40px; border-top: 1px solid rgba(0,0,0,0.1); color: #2c3e50; font-weight: bold; width: 100%; position: absolute; bottom: 0; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Anbudan Miththiran Admin</h2>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button onclick="login()">Login</button>
        <div id="message"></div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');

            try {
                const response = await fetch('https://premium-backend-8plp.onrender.com/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    messageDiv.innerText = "Login successful! Redirecting...";
                    messageDiv.className = "success";
                    messageDiv.style.display = "block";
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    messageDiv.innerText = data.message || "Invalid credentials";
                    messageDiv.className = "error";
                    messageDiv.style.display = "block";
                }
            } catch (err) {
                messageDiv.innerText = "Error connecting to server";
                messageDiv.className = "error";
                messageDiv.style.display = "block";
            }
        }
    </script>

    <footer>
        &copy; 2026 Anbudan Miththiran
    </footer>
</body>
</html>
