<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Anbudan Miththiran</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #F5E6D3 0%, #E8D5C4 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .navbar {
            background: white;
            border-bottom: 3px solid #B8D4E0;
            padding: 16px 0;
            margin-bottom: 40px;
            box-shadow: 0 2px 8px rgba(26, 58, 74, 0.08);
        }

        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-title {
            color: #1A3A4A;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .navbar-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .navbar-links a {
            color: #6BAA3D;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .navbar-links a:hover {
            color: #5A9230;
            text-decoration: underline;
        }

        .logout-btn {
            background: #D32F2F;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .logout-btn:hover {
            background: #B71C1C;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            color: #1A3A4A;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .page-header p {
            color: #666;
            font-size: 16px;
            font-weight: 400;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6BAA3D 0%, #5A9230 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(107, 170, 61, 0.3);
        }

        .btn-secondary {
            background: #B8D4E0;
            color: #1A3A4A;
        }

        .btn-secondary:hover {
            background: #A0C4D4;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 58, 74, 0.2);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            margin: 0 4px;
        }

        .btn-edit {
            background: #2196F3;
            color: white;
        }

        .btn-edit:hover {
            background: #1976D2;
        }

        .btn-delete {
            background: #D32F2F;
            color: white;
        }

        .btn-delete:hover {
            background: #B71C1C;
        }

        .content-section {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(26, 58, 74, 0.1);
            border: 2px solid #B8D4E0;
        }

        .section-title {
            color: #1A3A4A;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #B8D4E0;
            letter-spacing: -0.5px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .content-card {
            background: #F9F9F9;
            border: 2px solid #B8D4E0;
            border-radius: 10px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
        }

        .content-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(26, 58, 74, 0.12);
            border-color: #6BAA3D;
        }

        .content-card.premium {
            background: linear-gradient(135deg, #FFF9E6 0%, #FFF3E0 100%);
            border-color: #FFB74D;
        }

        .content-card.premium::before {
            content: "🔒 PREMIUM";
            position: absolute;
            top: 12px;
            right: 12px;
            background: #FFB74D;
            color: #1A3A4A;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .content-card.free::before {
            content: "FREE";
            position: absolute;
            top: 12px;
            right: 12px;
            background: #6BAA3D;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .content-type-badge {
            display: inline-block;
            background: #E3F2FD;
            color: #1976D2;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .content-title {
            color: #1A3A4A;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            margin-top: 8px;
            word-break: break-word;
            letter-spacing: -0.3px;
        }

        .content-body {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
        }

        .content-meta {
            font-size: 12px;
            color: #999;
            border-top: 1px solid #E0E0E0;
            padding-top: 12px;
            margin-bottom: 12px;
        }

        .content-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            color: #1A3A4A;
            font-size: 20px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .empty-state p {
            font-size: 14px;
            margin-bottom: 24px;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #1A3A4A;
            display: none; /* Hidden by default */
        }

        .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid #B8D4E0;
            border-top-color: #6BAA3D;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            color: #D32F2F;
            background: #FFF3E0;
            border-left: 4px solid #D32F2F;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .success-message {
            color: #2E7D32;
            background: #F1F8E9;
            border-left: 4px solid #2E7D32;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #B8D4E0;
        }

        .modal-header h2 {
            color: #1A3A4A;
            font-size: 20px;
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: #1A3A4A;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #1A3A4A;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #B8D4E0;
            border-radius: 8px;
            font-size: 16px;
            color: #1A3A4A;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #6BAA3D;
            box-shadow: 0 0 0 3px rgba(107, 170, 61, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        @media (max-width: 600px) {
            .navbar-content {
                flex-direction: column;
                gap: 12px;
            }

            .navbar-links {
                flex-direction: column;
                gap: 12px;
                width: 100%;
            }

            .content-section {
                padding: 24px 16px;
            }

            .page-header h1 {
                font-size: 28px;
            }

            .content-grid {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .content-actions {
                flex-direction: column;
            }

            .modal-content {
                width: 95%;
                margin: 20% auto;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-content">
            <div class="navbar-title">Anbudan Miththiran - Admin</div>
            <div class="navbar-links">
                <a href="upload.html">+ Upload Content</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Dashboard</h1>
            <p>Manage and view all your published content</p>
        </div>

        <div class="action-buttons">
            <a href="upload.html" class="btn btn-primary">+ Upload New Content</a>
            <button class="btn btn-secondary" onclick="refreshContent()">Refresh</button>
        </div>

        <div class="content-section">
            <h2 class="section-title">All Content</h2>
            <div id="errorContainer"></div>
            <div id="successContainer"></div>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Loading your content...</p>
            </div>
            <div id="content"></div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Content</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editForm">
                <div class="form-group">
                    <label for="editTitle">Title</label>
                    <input type="text" id="editTitle" required>
                </div>

                <div class="form-group">
                    <label for="editBody">Content</label>
                    <textarea id="editBody" required></textarea>
                </div>

                <div class="form-group">
                    <label for="editContentType">Content Category</label>
                    <select id="editContentType" required>
                        <option value="article">Article</option>
                        <option value="poem">Poem</option>
                        <option value="story">Story</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="editIsPremium">Access Level</label>
                    <select id="editIsPremium" required>
                        <option value="0">Free Content</option>
                        <option value="1">Premium Content</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = "https://premium-backend-8plp.onrender.com";
        const token = localStorage.getItem("token");
        let currentEditId = null;

        if (!token) {
            window.location = "admin.html";
        }

        function logout() {
            localStorage.removeItem("token");
            window.location = "admin.html";
        }

        function refreshContent() {
            loadContent();
        }

        function openEditModal(id, title, body, contentType, isPremium) {
            currentEditId = id;
            document.getElementById("editTitle").value = title;
            document.getElementById("editBody").value = body;
            document.getElementById("editContentType").value = contentType;
            document.getElementById("editIsPremium").value = isPremium;
            document.getElementById("editModal").style.display = "block";
        }

        function closeEditModal() {
            document.getElementById("editModal").style.display = "none";
            currentEditId = null;
        }

        // 1. Fixed the Edit Submission Logic
        document.getElementById("editForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                title: document.getElementById("editTitle").value,
                body: document.getElementById("editBody").value,
                contentType: document.getElementById("editContentType").value,
                isPremium: parseInt(document.getElementById("editIsPremium").value)
            };

            try {
                const token = localStorage.getItem("token");

                // Corrected fetch logic using async/await and dynamic data payload
                const response = await fetch(`${API}/content/${currentEditId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    closeEditModal();
                    showSuccessMessage("Content updated successfully!");
                    loadContent();
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.message || "Failed to update content");
                }
            } catch (error) {
                showErrorMessage(error.message || "Failed to update content");
            }
        });

        // 2. Fixed the Delete Logic
        async function deleteContent(id) {
            if (!confirm("Are you sure you want to delete this content? This action cannot be undone.")) {
                return;
            }

            try {
                const token = localStorage.getItem("token");

                // Corrected fetch logic using async/await
                const response = await fetch(`${API}/content/${id}`, {
                    method: "DELETE",
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });

                if (response.ok) {
                    showSuccessMessage("Content deleted successfully!");
                    loadContent();
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.message || "Failed to delete content");
                }
            } catch (error) {
                showErrorMessage(error.message || "Failed to delete content");
            }
        }

        function showErrorMessage(message) {
            const errorContainer = document.getElementById("errorContainer");
            errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
            setTimeout(() => {
                errorContainer.innerHTML = "";
            }, 5000);
        }

        function showSuccessMessage(message) {
            const successContainer = document.getElementById("successContainer");
            successContainer.innerHTML = `<div class="success-message">${message}</div>`;
            setTimeout(() => {
                successContainer.innerHTML = "";
            }, 5000);
        }

        // 3. Completed the loadContent
