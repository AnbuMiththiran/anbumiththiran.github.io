<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#f5f5f5;
}
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}
h1{
    text-align:center;
}
.card{
    background:#fff;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
}
button{
    margin:5px;
    padding:6px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.edit{background:#2196F3;color:#fff;}
.delete{background:#f44336;color:#fff;}
.add{background:#4CAF50;color:#fff;width:100%;}
input, textarea, select{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}
.modal-content{
    background:#fff;
    padding:20px;
    margin:10% auto;
    width:90%;
    max-width:500px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>🔥 Admin Dashboard</h1>

<button class="add" onclick="openAdd()">+ Add Content</button>

<div id="list"></div>
</div>

<!-- Modal -->
<div id="modal" class="modal">
<div class="modal-content">
<h3 id="modalTitle">Add Content</h3>

<input type="text" id="title" placeholder="Title">
<textarea id="body" rows="5" placeholder="Content"></textarea>

<select id="type">
<option value="article">Article</option>
<option value="poem">Poem</option>
<option value="story">Story</option>
</select>

<label>
<input type="checkbox" id="premium"> Premium
</label>

<button onclick="save()">Save</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<script>
const API = "https://premium-backend-8plp.onrender.com";
const token = localStorage.getItem("token");

if(!token){
    alert("Login first");
    window.location.href="admin.html";
}

let editId = null;

// LOAD CONTENT
async function load(){
    const res = await fetch(API + "/content", {
        headers:{ "Authorization":"Bearer " + token }
    });

    const data = await res.json();
    const list = document.getElementById("list");

    list.innerHTML = "";

    data.forEach(item=>{
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
        <strong>${item.title}</strong><br>
        <small>${item.contentType} | ${item.isPremium ? "🔒 Premium" : "Free"}</small><br>
        <button class="edit" onclick="openEdit(${item.id}, '${escape(item.title)}', '${escape(item.body)}', '${item.contentType}', ${item.isPremium})">Edit</button>
        <button class="delete" onclick="del(${item.id})">Delete</button>
        `;

        list.appendChild(div);
    });
}

// OPEN ADD
function openAdd(){
    editId = null;
    document.getElementById("modalTitle").innerText = "Add Content";
    document.getElementById("title").value = "";
    document.getElementById("body").value = "";
    document.getElementById("premium").checked = false;
    document.getElementById("modal").style.display = "block";
}

// OPEN EDIT
function openEdit(id, title, body, type, premium){
    editId = id;

    document.getElementById("modalTitle").innerText = "Edit Content";
    document.getElementById("title").value = unescape(title);
    document.getElementById("body").value = unescape(body);
    document.getElementById("type").value = type;
    document.getElementById("premium").checked = premium;

    document.getElementById("modal").style.display = "block";
}

// CLOSE MODAL
function closeModal(){
    document.getElementById("modal").style.display = "none";
}

// SAVE (ADD or UPDATE)
async function save(){
    const title = document.getElementById("title").value;
    const body = document.getElementById("body").value;
    const contentType = document.getElementById("type").value;
    const isPremium = document.getElementById("premium").checked;

    if(!title || !body){
        alert("Fill all fields");
        return;
    }

    const url = editId ? API + "/content/" + editId : API + "/add-content";
    const method = editId ? "PUT" : "POST";

    const res = await fetch(url, {
        method,
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer " + token
        },
        body: JSON.stringify({ title, body, contentType, isPremium })
    });

    const data = await res.json();

    alert(data.message || "Success");

    closeModal();
    load();
}

// DELETE
async function del(id){
    if(!confirm("Delete?")) return;

    await fetch(API + "/content/" + id, {
        method:"DELETE",
        headers:{ "Authorization":"Bearer " + token }
    });

    load();
}

// INIT
load();
</script>

</body>
    </html>
