<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - anbumiththiran.in</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; color: white; font-size: 14px; }
        .btn-primary { background-color: #007bff; }
        .btn-danger { background-color: #dc3545; }
        .btn-edit { background-color: #ffc107; color: black; }
        .btn-logout { background-color: #6c757d; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; }
        .actions { display: flex; gap: 10px; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-article { background-color: #e3f2fd; color: #0d47a1; }
        .badge-poem { background-color: #f3e5f5; color: #4a148c; }
        .badge-story { background-color: #e8f5e9; color: #1b5e20; }
        .badge-premium { background-color: #fff3e0; color: #e65100; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Admin Dashboard</h2>
            <div>
                <a href="upload.html" class="btn btn-primary">Add New Post</a>
                <button onclick="logout()" class="btn btn-logout">Logout</button>
            </div>
        </div>

        <div id="content-list">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Writer</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="posts-body">
                    <!-- Posts will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = 'admin.html';

        async function fetchPosts() {
            try {
                const response = await fetch('https://premium-backend-8plp.onrender.com/admin/content', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.status === 401 || response.status === 403) {
                    logout();
                    return;
                }
                const posts = await response.json();
                const tbody = document.getElementById('posts-body');
                tbody.innerHTML = '';

                posts.forEach(post => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${post.title}</td>
                        <td><span class="badge badge-${post.contenttype}">${post.contenttype}</span></td>
                        <td>${post.writer}</td>
                        <td>${post.ispremium ? '<span class="badge badge-premium">Premium</span>' : 'Public'}</td>
                        <td>${new Date(post.createdat).toLocaleDateString()}</td>
                        <td class="actions">
                            <button onclick="editPost(${post.id})" class="btn btn-edit">Edit</button>
                            <button onclick="deletePost(${post.id})" class="btn btn-danger">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                console.error("Error fetching posts:", err);
            }
        }

        async function deletePost(id) {
            if (!confirm("Are you sure you want to delete this post?")) return;
            try {
                const response = await fetch(`https://premium-backend-8plp.onrender.com/admin/content/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    fetchPosts();
                } else {
                    alert(data.message);
                }
            } catch (err) {
                alert("Error deleting post");
            }
        }

        function editPost(id) {
            window.location.href = `upload.html?id=${id}`;
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = 'admin.html';
        }

        fetchPosts();
    </script>
</body>
</html>
