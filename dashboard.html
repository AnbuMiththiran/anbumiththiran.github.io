<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>
body{font-family:sans-serif;background:#f5f5f5}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:10px}
button{margin:5px;padding:6px 10px}
</style>
</head>

<body>

<div class="container">
<h2>🔥 Admin Dashboard</h2>

<button onclick="goUpload()">+ Add Content</button>
<button onclick="logout()">Logout</button>

<div id="list"></div>
</div>

<script>
const API = "https://premium-backend-8plp.onrender.com";
const token = localStorage.getItem("token");

if(!token){
    window.location = "admin.html"; // login page
}

// LOAD POSTS
async function load(){
    const res = await fetch(API + "/content", {
        headers:{ "Authorization":"Bearer " + token }
    });

    const data = await res.json();
    const list = document.getElementById("list");

    list.innerHTML = "";

    data.forEach(item=>{
        const div = document.createElement("div");
        div.className="card";

        div.innerHTML = `
        <strong>${item.title}</strong><br>
        ${item.isPremium ? "🔒 Premium" : "Free"}<br>
        <button onclick="edit(${item.id})">Edit</button>
        <button onclick="del(${item.id})">Delete</button>
        `;

        list.appendChild(div);
    });
}

// DELETE
async function del(id){
    if(!confirm("Delete?")) return;

    await fetch(API + "/content/" + id,{
        method:"DELETE",
        headers:{ "Authorization":"Bearer " + token }
    });

    load();
}

// EDIT (simple)
function edit(id){
    window.location = "upload.html?id=" + id;
}

// NAVIGATION
function goUpload(){
    window.location = "upload.html";
}

function logout(){
    localStorage.removeItem("token");
    window.location = "admin.html";
}

load();
</script>

</body>
    </html>
