<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<button onclick="logout()">Logout</button>
<a href="upload.html">Upload Content</a>

<h3>All Content</h3>
<div id="content"></div>

<script>
const API = "https://premium-backend-8plp.onrender.com";
const token = localStorage.getItem("token");

if (!token) {
    window.location = "admin.html";
}

function logout(){
    localStorage.removeItem("token");
    window.location = "admin.html";
}

fetch(API + "/content")
.then(res => res.json())
.then(data => {
    let html = "";
    data.forEach(item => {
        html += `<p><b>${item.title}</b> - ${item.isPremium ? "🔒 Premium" : "Free"}</p>`;
    });
    document.getElementById("content").innerHTML = html;
});
</script>

</body>
</html>
