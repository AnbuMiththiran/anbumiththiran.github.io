<h2>Dashboard</h2>

<button onclick="logout()">Logout</button>
<a href="upload.html">Upload Content</a>

<div id="content"></div>

<script>
const API = "https://premium-backend-8plp.onrender.com";

if (!localStorage.getItem("admin")) {
    window.location = "admin.html";
}

function logout(){
    localStorage.removeItem("admin");
    window.location = "admin.html";
}

fetch(API + "/content")
.then(res => res.json())
.then(data => {
    let html = "";
    data.forEach(item => {
        html += `<p>${item.title} - ${item.isPremium ? "Premium" : "Free"}</p>`;
    });
    document.getElementById("content").innerHTML = html;
});
  </script>
