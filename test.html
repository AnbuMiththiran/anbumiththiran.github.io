<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anbudan Miththiran Podcast</title>

<!-- Google tag -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9RLGNJL2ZQ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-9RLGNJL2ZQ');
</script>

<style>

/* WEBSITE BACKGROUND */
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#fff4e6,#ffd8a8,#ffb703);
color:#3a2c1a;
}

/* HERO */

.hero{
text-align:center;
padding:50px 20px;
background:white;
box-shadow:0 3px 12px rgba(0,0,0,.08);
}

.hero h1{
font-size:2.4rem;
margin-bottom:10px;
}

.hero p{
max-width:600px;
margin:auto;
opacity:.8;
}

/* SECTION TITLE */

.section-title{
text-align:center;
margin:45px 0 20px;
}

/* FEATURED */

.featured-card{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.featured-card img{
width:100%;
border-radius:12px;
}

audio{
width:100%;
margin-top:10px;
}

/* GRID */

.container{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
max-width:1100px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 6px 18px rgba(0,0,0,.1);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
font-size:1rem;
margin:10px 0;
}

/* LISTEN BUTTON (BOTTOM) */

.listen-section{
text-align:center;
margin:40px 0 60px;
}

.listen-btn{
display:inline-block;
padding:14px 30px;
background:#1DB954;
color:white;
border-radius:40px;
text-decoration:none;
font-weight:bold;
transition:.3s;
box-shadow:0 5px 20px rgba(29,185,84,.4);
}

.listen-btn:hover{
background:#169944;
transform:scale(1.05);
}

/* FOOTER */

footer{
text-align:center;
padding:25px;
background:white;
font-size:.9rem;
opacity:.8;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

<h1>🎙 Anbudan Miththiran Podcast</h1>

<p>
Life • Philosophy • Society • Self Awakening  
Tamil podcast exploring deeper human truths.
</p>

</section>

<h2 class="section-title">🔥 Latest Episode</h2>
<div id="featured-episode"></div>

<h2 class="section-title">🎙 All Episodes</h2>
<div class="container" id="podcast-list"></div>

<!-- LISTEN MORE BUTTON MOVED HERE -->
<div class="listen-section">

<a href="https://open.spotify.com/show/5uMIWUWtjb0jkggHoEG6nl"
target="_blank"
class="listen-btn">
🎧 Listen More Episodes
</a>

</div>

<footer>
© 2026 Anbudan Miththiran
</footer>

<script>

/* LOAD LOCAL RSS JSON */
fetch("podcast-data.json")
.then(response => response.json())
.then(data => {

const container =
document.getElementById("podcast-list");

const featured =
document.getElementById("featured-episode");

/* FEATURED EPISODE */
const latest = data.items[0];

featured.innerHTML = `
<div class="featured-card">
<img src="${latest.thumbnail || data.feed.image}">
<h2>${latest.title}</h2>
<audio controls>
<source src="${latest.enclosure.link}" type="audio/mpeg">
</audio>
</div>
`;

/* OTHER EPISODES */
data.items.slice(1,7).forEach(item => {

const div = document.createElement("div");
div.className="card";

div.innerHTML = `
<img src="${item.thumbnail || data.feed.image}">
<h3>${item.title}</h3>

<audio controls>
<source src="${item.enclosure.link}" type="audio/mpeg">
</audio>
`;

container.appendChild(div);

});

})
.catch(error =>
console.log("RSS Load Error:", error));

</script>

</body>
</html>
