<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9RLGNJL2ZQ"></script>

    <title>Videos - Anbudan Miththiran</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="pratilipi-style.css">
    <style>
        .video-card {
            background: var(--bg-white);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .video-info {
            padding: 15px;
        }
        .video-info h3 {
            font-size: 1.1rem;
            color: var(--primary-dark);
            margin-bottom: 5px;
        }
        .shorts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .short-card {
            background: var(--bg-white);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .short-wrapper {
            position: relative;
            padding-bottom: 177.77%;
            height: 0;
        }
        .short-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        @media (max-width: 600px) {
            .shorts-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <!-- Desktop Header -->
    <header class="app-header">
        <a href="index.html" class="header-brand">Anbudan <span>Miththiran</span></a>
        <nav class="desktop-nav">
            <a href="index.html">Home</a>
            <a href="category.html?type=article">Articles</a>
            <a href="category.html?type=poem">Poems</a>
            <a href="category.html?type=story">Stories</a>
            <a href="videos.html" class="active">Videos</a>
            <a href="podcast.html">Podcast</a>
            <a href="books.html">Books</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav">
        <a href="index.html" class="mobile-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="category.html?type=article" class="mobile-nav-item">
            <i class="fas fa-newspaper"></i>
            <span>Articles</span>
        </a>
        <a href="videos.html" class="mobile-nav-item active">
            <i class="fas fa-play-circle"></i>
            <span>Videos</span>
        </a>
        <a href="books.html" class="mobile-nav-item">
            <i class="fas fa-book"></i>
            <span>Books</span>
        </a>
        <a href="about.html" class="mobile-nav-item">
            <i class="fas fa-user"></i>
            <span>About</span>
        </a>
    </nav>

    <main class="container">
        <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
            <h1 style="font-size: 1.8rem; color: var(--primary-dark);">Videos</h1>
            <a href="https://www.youtube.com/@AnbudanMiththiran" target="_blank" style="background: #FF0000; color: white; padding: 8px 15px; border-radius: 20px; text-decoration: none; font-size: 0.85rem; font-weight: 600;">
                <i class="fab fa-youtube"></i> Subscribe
            </a>
        </div>

        <h2 style="font-size: 1.3rem; margin-bottom: 15px; color: var(--gray-dark);">Latest Videos</h2>
        <div id="videos-container">
            <div style="text-align: center; padding: 50px;">
                <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary-color);"></i>
                <p style="margin-top: 10px; color: var(--gray-dark);">Loading videos...</p>
            </div>
        </div>

        <h2 style="font-size: 1.3rem; margin-bottom: 15px; color: var(--gray-dark);">Shorts</h2>
        <div id="shorts-container" class="shorts-grid">
            <!-- Shorts will be loaded here -->
        </div>
    </main>

    <script>
        const CHANNEL_ID = 'UCF4J9RTNoyk0zKYeJ87tslQ';
        const RSS_URL = `https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`;
        const PROXY_URL = 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(RSS_URL);

        async function loadYouTubeContent() {
            const videosContainer = document.getElementById('videos-container');
            const shortsContainer = document.getElementById('shorts-container');

            try {
                const response = await fetch(PROXY_URL);
                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const entries = xmlDoc.getElementsByTagName("entry");

                if (entries.length === 0) {
                    videosContainer.innerHTML = '<p>No videos found.</p>';
                    return;
                }

                videosContainer.innerHTML = '';
                shortsContainer.innerHTML = '';

                let videoCount = 0;
                let shortsCount = 0;

                for (let i = 0; i < entries.length; i++) {
                    const entry = entries[i];
                    const title = entry.getElementsByTagName("title")[0].textContent;
                    const videoId = entry.getElementsByTagName("yt:videoId")[0].textContent;
                    const link = entry.getElementsByTagName("link")[0].getAttribute("href");
                    const published = new Date(entry.getElementsByTagName("published")[0].textContent).toLocaleDateString();

                    const isShort = link.includes('/shorts/') || title.toLowerCase().includes('#shorts');

                    if (isShort && shortsCount < 8) {
                        const card = document.createElement('div');
                        card.className = 'short-card';
                        card.innerHTML = `
                            <div class="short-wrapper">
                                <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen loading="lazy"></iframe>
                            </div>
                            <div style="padding: 10px;">
                                <p style="font-size: 0.8rem; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${title}</p>
                            </div>
                        `;
                        shortsContainer.appendChild(card);
                        shortsCount++;
                    } else if (!isShort && videoCount < 6) {
                        const card = document.createElement('div');
                        card.className = 'video-card';
                        card.innerHTML = `
                            <div class="video-wrapper">
                                <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen loading="lazy"></iframe>
                            </div>
                            <div class="video-info">
                                <h3>${title}</h3>
                                <p style="font-size: 0.85rem;">${published}</p>
                            </div>
                        `;
                        videosContainer.appendChild(card);
                        videoCount++;
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                videosContainer.innerHTML = '<p>Error loading videos.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadYouTubeContent);
    </script>
</body>
</html>
