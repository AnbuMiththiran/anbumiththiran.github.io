<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9RLGNJL2ZQ"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-9RLGNJL2ZQ');
    </script>
    
    <title>Videos - Anbudan Miththiran</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="facebook-style.css">
    <style>
        .video-card-fb {
            background: var(--fb-white);
            border-radius: 8px;
            box-shadow: var(--fb-card-shadow);
            margin-bottom: 16px;
            overflow: hidden;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .shorts-container-fb {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .short-card-fb {
            background: var(--fb-white);
            border-radius: 8px;
            box-shadow: var(--fb-card-shadow);
            overflow: hidden;
        }
        .short-video-wrapper {
            position: relative;
            padding-bottom: 177.77%; /* 9:16 */
            height: 0;
        }
        .short-video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

    <!-- Facebook Style Header -->
    <header class="fb-header">
        <div class="header-left">
            <a href="index.html" class="fb-logo">A</a>
            <div class="fb-search">
                <i class="fas fa-search" style="color: #65676B;"></i>
                <input type="text" id="search-input" placeholder="Search Anbudan Miththiran">
            </div>
        </div>
        <div class="header-center">
            <a href="index.html" class="nav-item" title="Home"><i class="fas fa-home fa-lg"></i></a>
            <a href="videos.html" class="nav-item active" title="Videos"><i class="fas fa-play-circle fa-lg"></i></a>
            <a href="books.html" class="nav-item" title="Books"><i class="fas fa-book fa-lg"></i></a>
            <a href="podcast.html" class="nav-item" title="Podcast"><i class="fas fa-podcast fa-lg"></i></a>
        </div>
        <div class="header-right">
            <a href="about.html" class="profile-link">
                <img src="logo.jpg" alt="Profile" class="profile-pic">
                <span>Miththiran</span>
            </a>
        </div>
    </header>

    <!-- Mobile Navigation -->
    <nav class="mobile-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home fa-lg"></i></a>
        <a href="category.html?type=article" class="nav-item"><i class="fas fa-newspaper fa-lg"></i></a>
        <a href="videos.html" class="nav-item active"><i class="fas fa-play-circle fa-lg"></i></a>
        <a href="books.html" class="nav-item"><i class="fas fa-book fa-lg"></i></a>
        <a href="about.html" class="nav-item"><i class="fas fa-bars fa-lg"></i></a>
    </nav>

    <main class="fb-main">
        <!-- Left Sidebar -->
        <aside class="fb-sidebar">
            <a href="index.html" class="sidebar-item">
                <div class="sidebar-icon" style="color: #1877F2;"><i class="fas fa-arrow-left"></i></div>
                <span>Back to Feed</span>
            </a>
            <a href="videos.html" class="sidebar-item" style="background: var(--fb-hover); font-weight: 600;">
                <div class="sidebar-icon" style="color: #1877F2;"><i class="fas fa-video"></i></div>
                <span>All Videos</span>
            </a>
        </aside>

        <!-- Main Feed -->
        <section class="fb-feed">
            <div class="fb-card" style="padding: 16px; margin-bottom: 16px;">
                <h1 style="font-size: 24px; font-weight: 700;">Videos</h1>
            </div>

            <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 12px; color: var(--fb-text-secondary);">Latest Videos</h2>
            <div id="videos-container">
                <div class="fb-card" style="text-align: center; padding: 40px;">
                    <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--fb-blue);"></i>
                    <p style="margin-top: 10px; color: var(--fb-text-secondary);">Loading videos...</p>
                </div>
            </div>

            <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 12px; color: var(--fb-text-secondary);">Shorts</h2>
            <div id="shorts-container" class="shorts-container-fb">
                <!-- Shorts will be loaded here -->
            </div>
        </section>

        <!-- Right Panel -->
        <aside class="fb-right-panel">
            <div class="fb-card">
                <h3 style="font-size: 17px; color: var(--fb-text-secondary); margin-bottom: 12px;">YouTube Channel</h3>
                <p style="font-size: 14px; color: var(--fb-text-primary);">Subscribe to Anbudan Miththiran for more Tamil literature content.</p>
                <a href="https://www.youtube.com/@AnbudanMiththiran" target="_blank" class="action-btn" style="background: #FF0000; color: white; margin-top: 12px;">
                    <i class="fab fa-youtube"></i> Subscribe
                </a>
            </div>
        </aside>
    </main>

    <script>
        const CHANNEL_ID = 'UCF4J9RTNoyk0zKYeJ87tslQ';
        const RSS_URL = `https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`;
        const PROXY_URL = 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(RSS_URL);

        async function loadYouTubeContent() {
            const videosContainer = document.getElementById('videos-container');
            const shortsContainer = document.getElementById('shorts-container');

            try {
                const response = await fetch(PROXY_URL);
                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const entries = xmlDoc.getElementsByTagName("entry");

                if (entries.length === 0) {
                    videosContainer.innerHTML = '<div class="fb-card" style="padding: 20px;"><p>No videos found.</p></div>';
                    return;
                }

                videosContainer.innerHTML = '';
                shortsContainer.innerHTML = '';

                let videoCount = 0;
                let shortsCount = 0;

                for (let i = 0; i < entries.length; i++) {
                    const entry = entries[i];
                    const title = entry.getElementsByTagName("title")[0].textContent;
                    const videoId = entry.getElementsByTagName("yt:videoId")[0].textContent;
                    const link = entry.getElementsByTagName("link")[0].getAttribute("href");
                    const published = new Date(entry.getElementsByTagName("published")[0].textContent).toLocaleDateString();

                    const isShort = link.includes('/shorts/') || title.toLowerCase().includes('#shorts');

                    if (isShort && shortsCount < 8) {
                        const card = document.createElement('div');
                        card.className = 'short-card-fb';
                        card.innerHTML = `
                            <div class="short-video-wrapper">
                                <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen loading="lazy"></iframe>
                            </div>
                            <div style="padding: 8px;">
                                <p style="font-size: 13px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${title}</p>
                            </div>
                        `;
                        shortsContainer.appendChild(card);
                        shortsCount++;
                    } else if (!isShort && videoCount < 6) {
                        const card = document.createElement('div');
                        card.className = 'video-card-fb';
                        card.innerHTML = `
                            <div class="card-header" style="padding: 12px;">
                                <img src="logo.jpg" class="card-author-pic" alt="Miththiran">
                                <div class="card-meta">
                                    <h3>Anbudan Miththiran</h3>
                                    <p>${published} • <i class="fas fa-globe-americas"></i></p>
                                </div>
                            </div>
                            <div style="padding: 0 12px 12px 12px;">
                                <p style="font-weight: 500; margin-bottom: 8px;">${title}</p>
                            </div>
                            <div class="video-container">
                                <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen loading="lazy"></iframe>
                            </div>
                            <div class="card-actions">
                                <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank" class="action-btn">
                                    <i class="fab fa-youtube"></i> Watch on YouTube
                                </a>
                            </div>
                        `;
                        videosContainer.appendChild(card);
                        videoCount++;
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                videosContainer.innerHTML = '<div class="fb-card" style="padding: 20px;"><p>Error loading videos.</p></div>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadYouTubeContent);
    </script>
</body>
</html>
