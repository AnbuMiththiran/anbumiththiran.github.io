        .video-card {

        }

        .video-wrapper iframe {

            left: 0;
            width: 100%;
            height: 100%;

        .video-info {

        }

            color: var(--primary-dark);
            margin-bottom: 5px;
        }
        .shorts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .short-card {
            background: var(--bg-white);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .short-wrapper {

        }
        .short-wrapper iframe {

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        @media (max-width: 600px) {
            .shorts-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>

    <main class="container">
        <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
            <h1 style="font-size: 1.8rem; color: var(--primary-dark);">Videos</h1>
            <a href="https://www.youtube.com/@AnbudanMiththiranWorks" target="_blank" style="background: #FF0000; color: white; padding: 8px 15px; border-radius: 20px; text-decoration: none; font-size: 0.85rem; font-weight: 600;">
                <i class="fab fa-youtube"></i> Subscribe
            </a>
        </div>

        <h2 style="font-size: 1.3rem; margin-bottom: 15px; color: var(--gray-dark);">Latest Videos</h2>
        <div id="videos-container">
            <div style="text-align: center; padding: 50px;">
                <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary-color);"></i>
                <p style="margin-top: 10px; color: var(--gray-dark);">Loading videos...</p>
            </div>
        </div>

        <h2 style="font-size: 1.3rem; margin-bottom: 15px; color: var(--gray-dark);">Shorts</h2>
        <div id="shorts-container" class="shorts-grid">
            <!-- Shorts will be loaded here -->
        </div>
    </main>

    <script>
        // 1. Updated ID and logic for a specific playlist
        const PLAYLIST_ID = 'PLClU3NeglzQF1TXYxbXdT9UDduhT0N-Ar'; 
        const RSS_URL = `https://www.youtube.com/feeds/videos.xml?playlist_id=${PLAYLIST_ID}`;
        
        // 2. Switched to rss2json API to fix CORS and rate-limiting issues
        const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;

        async function loadYouTubeContent() {
            const videosContainer = document.getElementById('videos-container');
            const shortsContainer = document.getElementById('shorts-container');

            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if (data.status !== 'ok' || !data.items || data.items.length === 0) {
                    videosContainer.innerHTML = '<p>No videos found.</p>';
                    return;
                }

                videosContainer.innerHTML = '';
                shortsContainer.innerHTML = '';

                let videoCount = 0;
                let shortsCount = 0;

                data.items.forEach(item => {
                    // Extract video ID from link
                    const videoId = item.link.split('v=')[1];
                    const title = item.title;
                    const published = new Date(item.pubDate).toLocaleDateString();

                    // Check if short
                    const isShort = title.toLowerCase().includes('#shorts');

                    if (isShort && shortsCount < 8) {
                        const card = document.createElement('div');
                        card.className = 'short-card';
                        card.innerHTML = `
                            <div class="short-wrapper">
                                <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen loading="lazy"></iframe>
                            </div>
                            <div style="padding: 10px;">
                                <p style="font-size: 0.8rem; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${title}</p>
                            </div>
                        `;
                        shortsContainer.appendChild(card);
                        shortsCount++;
                    } else if (!isShort && videoCount < 8) {
                        const card = document.createElement('div');
                        card.className = 'video-card';
                        card.innerHTML = `
                            <div class="video-wrapper">
                                <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen loading="lazy"></iframe>
                            </div>
                            <div class="video-info">
                                <h3>${title}</h3>
                                <p style="font-size: 0.85rem;">${published}</p>
                            </div>
                        `;
                        videosContainer.appendChild(card);
                        videoCount++;
                    }
                });
            } catch (error) {
                console.error('Error:', error);
                videosContainer.innerHTML = '<p style="color:red;">Error loading videos.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadYouTubeContent);
    </script>
