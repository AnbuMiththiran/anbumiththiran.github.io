<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Modern Website</title>
    <link rel="stylesheet" href="styles.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=YOUR_GOOGLE_ANALYTICS_ID"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'YOUR_GOOGLE_ANALYTICS_ID');
    </script>
</head>
<body>
    <header>
        <h1>Welcome to My Modern Website</h1>
    </header>
    <main>
        <div class="posts-grid">
            <!-- Posts will be dynamically injected here -->
        </div>
        <div class="search-container">
            <input type="text" placeholder="Search..." aria-label="Search">
            <button aria-label="Search"><i class="search-icon"></i></button>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 My Modern Website</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>

<style>
body {
    background-color: #121212;
    color: #ffffff;
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
}
header, footer {
    text-align: center;
    padding: 20px;
}
.posts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}
.search-container {
    display: flex;
    justify-content: center;
    margin: 20px 0;
}
input[type="text"] {
    padding: 10px;
    border: none;
    border-radius: 25px;
    margin-right: 10px;
}
button {
    background-color: #6200ea;
    color: white;
    border: none;
    border-radius: 50%;
    padding: 10px;
    cursor: pointer;
}
button:hover { /* Smooth animation */
    transform: scale(1.1);
}
</style>

<body>
    <header>
        <h1>Anbudan Miththiran</h1>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="category.html?type=article">Articles</a>
        <a href="category.html?type=poem">Poems</a>
        <a href="category.html?type=story">Stories</a>
        <a href="videos.html">Videos</a>
        <a href="podcast.html">Podcast</a>
        <a href="books.html">Books</a>
    </nav>

    <main>
        <div class="search-container">
            <input 
                type="text" 
                id="search-input" 
                class="search-input" 
                placeholder="தேடுக... (Search in Tamil or English)"
                aria-label="Search posts"
            >
            <button id="search-btn" class="search-btn">Search</button>
        </div>

        <div id="posts-container"></div>
    </main>

    <footer style="text-align: center; padding: 20px; margin-top: 40px; border-top: 1px solid rgba(0,0,0,0.1); color: #2c3e50; font-weight: bold;">
        &copy; 2026 Anbudan Miththiran
    </footer>

    <script>
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function trackEvent(eventName, params) {
            if (typeof gtag === 'function') {
                gtag('event', eventName, params);
            }
        }

        async function fetchPublicPosts(query = '') {
            try {
                const url = query 
                    ? `https://premium-backend-8plp.onrender.com/content/public?q=${encodeURIComponent(query)}`
                    : 'https://premium-backend-8plp.onrender.com/content/public';
                
                const response = await fetch(url, { 
                    signal: AbortSignal.timeout(10000) // 10s timeout
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const posts = await response.json();
                const container = document.getElementById('posts-container');
                container.innerHTML = '';

                if (!Array.isArray(posts) || posts.length === 0) {
                    container.innerHTML = '<p>No posts found matching your search.</p>';
                    return;
                }

                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'post-card';

                    let displayImage = '';
                    if (post.contenttype === 'book') {
                        displayImage = post.book_cover_url || post.image_url;
                    } else {
                        displayImage = post.image_url;
                    }

                    if (displayImage) {
                        const img = document.createElement('img');
                        img.src = displayImage;
                        img.alt = escapeHtml(post.title);
                        img.style.cssText = 'width:100%; max-height:300px; object-fit:cover; border-radius:4px; margin-bottom:15px;';
                        img.onerror = function() { this.style.display = 'none'; };
                        card.appendChild(img);
                    }

                    const badge = document.createElement('span');
                    badge.className = `badge badge-${post.contenttype}`;
                    badge.textContent = post.contenttype;
                    card.appendChild(badge);

                    const title = document.createElement('h2');
                    title.textContent = post.title;
                    card.appendChild(title);

                    const meta = document.createElement('div');
                    meta.className = 'post-meta';
                    meta.textContent = `By ${escapeHtml(post.writer)} | ${new Date(post.createdat).toLocaleDateString()}`;
                    card.appendChild(meta);

                    const tagsDiv = document.createElement('div');
                    tagsDiv.className = 'post-tags';
                    if (post.tags && Array.isArray(post.tags)) {
                        post.tags.forEach(tag => {
                            const tagSpan = document.createElement('span');
                            tagSpan.className = 'tag';
                            tagSpan.textContent = `#${escapeHtml(tag)}`;
                            tagsDiv.appendChild(tagSpan);
                        });
                    }
                    card.appendChild(tagsDiv);

                    const link = document.createElement('a');
                    link.href = `post.html?id=${encodeURIComponent(post.id)}`;
                    link.className = 'read-more';
                    link.textContent = 'Read Full Post';
                    link.addEventListener('click', () => {
                        trackEvent('view_post', { 
                            post_title: post.title, 
                            post_id: post.id 
                        });
                    });
                    card.appendChild(link);

                    container.appendChild(card);
                });
            } catch (err) {
                console.error("Error fetching posts:", err);
                document.getElementById('posts-container').innerHTML = 
                    '<p>Error loading content. Please try again later.</p>';
            }
        }

        function handleSearch() {
            const query = document.getElementById('search-input').value.trim();
            fetchPublicPosts(query);
        }

        // Event listeners
        document.getElementById('search-btn').addEventListener('click', handleSearch);
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        // Load posts on page load
        fetchPublicPosts();
    </script>
</body>
</html>
