 <script>
const API = "https://premium-backend-8plp.onrender.com";

fetch(API + "/content-public")
.then(res => res.json())
.then(data => {
    const list = document.getElementById("dynamicList");

    if (!data || data.length === 0) {
        list.innerHTML = '<li style="text-align: center; color: #999;">No posts yet. Check back soon!</li>';
        return;
    }

    data.forEach(item => {
        const li = document.createElement("li");
        const typeEmoji = item.contentType === 'poem' ? '✍️' : item.contentType === 'story' ? '📖' : '📝';
        const typeLabel = item.contentType ? item.contentType.charAt(0).toUpperCase() + item.contentType.slice(1) : 'Article';
        const accessIcon = item.isPremium == 1 ? "🔒" : "✨";
        const accessLabel = item.isPremium == 1 ? "Premium" : "Free";

        li.innerHTML = `
        <a href="post.html?id=${item.id}" style="text-decoration: none; color: inherit; display: block;">
            <strong>${typeEmoji} ${item.title}</strong><br>
            <span style="font-size: 12px; color: #999;">${accessIcon} ${accessLabel} • ${typeLabel}</span>
        </a>
        `;
        li.style.cursor = 'pointer';
        li.style.transition = 'all 0.3s ease';
        li.onmouseover = function() {
            this.style.background = '#f5f5f5';
            this.style.transform = 'translateX(4px)';
        };
        li.onmouseout = function() {
            this.style.background = '#fff';
            this.style.transform = 'translateX(0)';
        };

        list.appendChild(li);
    });
})
.catch(err => {
    console.error('Error loading posts:', err);
    const list = document.getElementById("dynamicList");
    list.innerHTML = '<li style="text-align: center; color: #999;">Error loading posts. Please refresh.</li>';
});
      </script>     
      
<script>
// Try to load from local JSON first, fallback to API
Promise.resolve()
    .then(() => fetch('/writings/latest.json').then(res => res.json()).catch(() => null))
    .then(data => {
        if (data && data.items && data.items.length > 0) {
            const list = document.getElementById('latestList');
            data.items.forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `
                ${item.type === "Poem" ? "✍️" : "📖"}
                <a href="${item.url}">${item.title}</a>
                <br><span>${item.date}</span>`;
                list.appendChild(li);
            });
        } else {
            // Fallback: show message
            const list = document.getElementById('latestList');
            list.innerHTML = '<li style="text-align: center; color: #999;">Check back for latest poems and stories!</li>';
        }
    })
    .catch(err => {
        console.error('Error loading writings:', err);
        const list = document.getElementById('latestList');
        list.innerHTML = '<li style="text-align: center; color: #999;">Check back for latest poems and stories!</li>';
    });
</script>

<script>
const API = "https://premium-backend-8plp.onrender.com";

async function loadPosts() {
    const list = document.getElementById("dynamicList");

    try {
        const res = await fetch(API + "/content");

        if (!res.ok) throw new Error("API error");

        const data = await res.json();

        if (!data || data.length === 0) {
            list.innerHTML = "<li>No posts yet</li>";
            return;
        }

        list.innerHTML = "";

        data.reverse().forEach(item => {
            const li = document.createElement("li");

            const icon = item.isPremium == 1 ? "🔒" : "✨";

            li.innerHTML = `
                <a href="post.html?id=${item.id}">
                    <strong>${icon} ${item.title}</strong>
                </a>
            `;

            list.appendChild(li);
        });

    } catch (err) {
        console.error(err);
        list.innerHTML = "<li>Error loading posts</li>";
    }
}

loadPosts();
      </script>
