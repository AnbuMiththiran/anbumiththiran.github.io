    <script>
        function trackEvent(eventName, params) {
            if (typeof gtag === 'function') {
                gtag('event', eventName, params);
            }
        }

        async function fetchPublicPosts(query = '') {
            try {
                const url = query 
                    ? `https://premium-backend-8plp.onrender.com/content/public?q=${encodeURIComponent(query)}`
                    : 'https://premium-backend-8plp.onrender.com/content/public';
                
                const response = await fetch(url);
                const posts = await response.json();
                const container = document.getElementById('posts-container');
                container.innerHTML = '';

                if (posts.length === 0) {
                    container.innerHTML = '<div class="fb-card" style="text-align:center; padding: 20px;"><p style="font-size:1.1rem; color:var(--fb-text-secondary);">No posts found matching your search.</p></div>';
                    return;
                }

                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'fb-card';

                    let displayImage = '';
                    if (post.contenttype === 'book') {
                        displayImage = post.book_cover_url || post.image_url;
                    } else {
                        displayImage = post.image_url;
                    }

                    const imageHtml = displayImage 
                        ? `<img src="${displayImage}" class="card-image" alt="${post.title}" onerror="this.style.display='none'">`
                        : '';

                    card.innerHTML = `
                        <div class="card-header">
                            <img src="logo.jpg" class="card-author-pic" alt="Miththiran">
                            <div class="card-meta">
                                <h3>${post.writer}</h3>
                                <p>${new Date(post.createdat).toLocaleDateString()} • <i class="fas fa-globe-americas"></i></p>
                            </div>
                        </div>
                        <div class="card-content">
                            <p style="font-weight: 600; font-size: 17px; margin-bottom: 8px;">${post.title}</p>
                            <div style="margin-bottom: 10px;">
                                ${post.tags ? post.tags.map(tag => `<span style="color: #1877F2; margin-right: 5px;">#${tag}</span>`).join('') : ''}
                            </div>
                        </div>
                        ${imageHtml}
                        <div class="card-actions">
                            <a href="post.html?id=${post.id}" class="action-btn" onclick="trackEvent('view_post', { post_title: '${post.title.replace(/'/g, "\\'")}', post_id: '${post.id}' })">
                                <i class="far fa-eye"></i> Read More
                            </a>
                            <button class="action-btn" onclick="sharePost('${post.title}', '${post.id}')">
                                <i class="far fa-share-square"></i> Share
                            </button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error("Error fetching posts:", err);
                document.getElementById('posts-container').innerHTML = '<div class="fb-card" style="text-align:center; padding: 20px;"><p>Error loading content. Please try again later.</p></div>';
            }
        }

        function sharePost(title, id) {
            if (navigator.share) {
                navigator.share({
                    title: title,
                    url: window.location.origin + '/post.html?id=' + id
                });
            } else {
                alert('Sharing not supported on this browser. Link: ' + window.location.origin + '/post.html?id=' + id);
            }
        }

        function handleSearch() {
            const query = document.getElementById('search-input').value;
            fetchPublicPosts(query);
        }

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        fetchPublicPosts();
    </script>
