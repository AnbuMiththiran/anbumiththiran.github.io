<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Modern Website</title>
    <link rel="stylesheet" href="styles.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=YOUR_GOOGLE_ANALYTICS_ID"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'YOUR_GOOGLE_ANALYTICS_ID');
    </script>
</head>
<body>
    <header>
        <h1>Welcome to My Modern Website</h1>
    </header>
    <main>
        <div class="posts-grid">
            <!-- Posts will be dynamically injected here -->
        </div>
        <div class="search-container">
            <input type="text" placeholder="Search..." aria-label="Search">
            <button aria-label="Search"><i class="search-icon"></i></button>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 My Modern Website</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>

<style>
body {
    background-color: #121212;
    color: #ffffff;
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
}
header, footer {
    text-align: center;
    padding: 20px;
}
.posts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}
.search-container {
    display: flex;
    justify-content: center;
    margin: 20px 0;
}
input[type="text"] {
    padding: 10px;
    border: none;
    border-radius: 25px;
    margin-right: 10px;
}
button {
    background-color: #6200ea;
    color: white;
    border: none;
    border-radius: 50%;
    padding: 10px;
    cursor: pointer;
}
button:hover { /* Smooth animation */
    transform: scale(1.1);
}
</style>

<script>
// Existing functionalities - Google Analytics, API calls and event tracking would remain intact
</script>
