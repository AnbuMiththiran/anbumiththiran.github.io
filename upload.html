<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Content - Anbudan Miththiran</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #F5E6D3 0%, #E8D5C4 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .navbar {
            background: white;
            border-bottom: 3px solid #B8D4E0;
            padding: 16px 0;
            margin-bottom: 40px;
            box-shadow: 0 2px 8px rgba(26, 58, 74, 0.08);
        }

        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-title {
            color: #1A3A4A;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .navbar-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .navbar-links a {
            color: #6BAA3D;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .navbar-links a:hover {
            color: #5A9230;
            text-decoration: underline;
        }

        .logout-btn {
            background: #D32F2F;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .logout-btn:hover {
            background: #B71C1C;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3);
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            color: #1A3A4A;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .page-header p {
            color: #666;
            font-size: 16px;
            font-weight: 400;
        }

        .upload-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(26, 58, 74, 0.1);
            border: 2px solid #B8D4E0;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group label {
            display: block;
            color: #1A3A4A;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #B8D4E0;
            border-radius: 8px;
            font-size: 16px;
            color: #1A3A4A;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #6BAA3D;
            box-shadow: 0 0 0 3px rgba(107, 170, 61, 0.1);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #999;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 200px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-group select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236BAA3D' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 20px;
            padding-right: 40px;
        }

        .upload-btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #6BAA3D 0%, #5A9230 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(107, 170, 61, 0.3);
        }

        .upload-btn:active {
            transform: translateY(0);
        }

        .upload-btn:disabled {
            background: #999;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            color: #2E7D32;
            background: #F1F8E9;
            border-left: 4px solid #2E7D32;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .error-message {
            color: #D32F2F;
            background: #FFF3E0;
            border-left: 4px solid #D32F2F;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .loading {
            display: none;
            text-align: center;
            color: #1A3A4A;
            font-size: 14px;
            margin-top: 10px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #B8D4E0;
            border-top-color: #6BAA3D;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-link {
            display: inline-block;
            color: #6BAA3D;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .back-link:hover {
            color: #5A9230;
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .navbar-content {
                flex-direction: column;
                gap: 12px;
            }

            .navbar-links {
                flex-direction: column;
                gap: 12px;
                width: 100%;
            }

            .upload-card {
                padding: 24px 16px;
            }

            .page-header h1 {
                font-size: 28px;
            }

            .form-group input,
            .form-group textarea,
            .form-group select {
                padding: 10px 12px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-content">
            <div class="navbar-title">Anbudan Miththiran - Admin</div>
            <div class="navbar-links">
                <a href="dashboard.html">Dashboard</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <div class="container">
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>

        <div class="page-header">
            <h1>Upload Content</h1>
            <p>Share your thoughts, stories, and wisdom with our community</p>
        </div>

        <div class="upload-card">
            <div class="success-message" id="successMessage">✓ Content uploaded successfully! Redirecting...</div>
            <div class="error-message" id="errorMessage"></div>

            <form id="form">
                <div class="form-group">
                    <label for="title">Content Title</label>
                    <input 
                        type="text"
                        id="title"
                        name="title" 
                        placeholder="Enter the title of your content" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="body">Content</label>
                    <textarea 
                        id="body"
                        name="body" 
                        placeholder="Write your content here..." 
                        required
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="isPremium">Content Type</label>
                    <select id="isPremium" name="isPremium" required>
                        <option value="0">Free Content</option>
                        <option value="1">Premium Content</option>
                    </select>
                </div>

                <button type="submit" class="upload-btn" id="submitBtn">Upload Content</button>
                <div class="loading" id="loading">
                    <span class="spinner"></span>
                    Uploading...
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = "https://premium-backend-8plp.onrender.com";
        const token = localStorage.getItem("token");

        if (!token) {
            window.location = "admin.html";
        }

        function logout() {
            localStorage.removeItem("token");
            window.location = "admin.html";
        }

        const form = document.getElementById("form");
        const successMessage = document.getElementById("successMessage");
        const errorMessage = document.getElementById("errorMessage");
        const loading = document.getElementById("loading");
        const submitBtn = document.getElementById("submitBtn");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                title: document.getElementById("title").value,
                body: document.getElementById("body").value,
                isPremium: document.getElementById("isPremium").value
            };

            // Show loading state
            loading.style.display = "block";
            submitBtn.disabled = true;
            errorMessage.style.display = "none";
            successMessage.style.display = "none";

            try {
                const response = await fetch(API + "/add-content", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    successMessage.style.display = "block";
                    form.reset();
                    setTimeout(() => {
                        window.location = "dashboard.html";
                    }, 1500);
                } else {
                    throw new Error("Failed to upload content");
                }
            } catch (error) {
                errorMessage.textContent = error.message || "An error occurred while uploading. Please try again.";
                errorMessage.style.display = "block";
                loading.style.display = "none";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
