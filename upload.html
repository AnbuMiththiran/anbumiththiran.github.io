<!DOCTYPE html>
<html>
<head>
    <title>Upload Content</title>
</head>
<body>

<h2>Upload Content</h2>

<form id="form">
    <input name="title" placeholder="Title"><br><br>
    <textarea name="body" placeholder="Content"></textarea><br><br>

    <label>Type:</label>
    <select name="isPremium">
        <option value="0">Free</option>
        <option value="1">Premium</option>
    </select><br><br>

    <button>Upload</button>
</form>

<script>
const API = "https://premium-backend-8plp.onrender.com";
const token = localStorage.getItem("token");

if (!token) {
    window.location = "admin.html";
}

document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();

    const data = {
        title: e.target.title.value,
        body: e.target.body.value,
        isPremium: e.target.isPremium.value
    };

    await fetch(API + "/add-content", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": token
        },
        body: JSON.stringify(data)
    });

    alert("Content uploaded 🔥");
};
</script>

</body>
    </html>
