<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Content - Anbudan Miththiran</title>
    <!-- Quill Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #fff4e6, #ffd8a8, #ffb703); min-height: 100vh; margin: 0; font-family: sans-serif; }
        .container { max-width: 900px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #2c3e50; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        #editor-container { height: 400px; margin-bottom: 20px; }
        .btn { padding: 12px 25px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; color: white; font-size: 16px; font-weight: bold; }
        .btn-primary { background-color: #2c3e50; }
        .btn-primary:hover { background-color: #34495e; }
        .btn-secondary { background-color: #95a5a6; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        .checkbox-group input { width: auto; }
        .book-links { display: none; background: #f9f9f9; padding: 15px; border-radius: 4px; border: 1px solid #eee; margin-top: 10px; }
        .book-links h4 { margin-top: 0; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 id="form-title">Add New Post</h2>
            <a href="dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
        </div>

        <form id="post-form">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" required placeholder="Enter post title">
            </div>
            <div class="form-group">
                <label for="writer">Writer Name</label>
                <input type="text" id="writer" value="Anbudan Miththiran">
            </div>
            <div class="form-group">
                <label for="contentType">Category</label>
                <select id="contentType" onchange="toggleBookLinks()">
                    <option value="article">Article</option>
                    <option value="poem">Poem</option>
                    <option value="story">Story</option>
                    <option value="book">Book</option>
                </select>
            </div>

            <div id="book-links-container" class="book-links">
                <h4>Book Purchase Links</h4>
                <div class="form-group">
                    <label for="amazon">Amazon Link</label>
                    <input type="text" id="amazon" placeholder="https://amazon.in/...">
                </div>
                <div class="form-group">
                    <label for="flipkart">Flipkart Link</label>
                    <input type="text" id="flipkart" placeholder="https://flipkart.com/...">
                </div>
                <div class="form-group">
                    <label for="notion">Notion Press Link</label>
                    <input type="text" id="notion" placeholder="https://notionpress.com/...">
                </div>
            </div>

            <div class="form-group">
                <label for="tags">Tags (comma separated)</label>
                <input type="text" id="tags" placeholder="e.g., nature, life, inspiration">
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="isPremium">
                <label for="isPremium">Premium Content</label>
            </div>
            <div class="form-group">
                <label>Content Body</label>
                <div id="editor-container"></div>
            </div>
            <button type="submit" class="btn btn-primary" id="submit-btn">Publish Post</button>
        </form>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = 'admin.html';

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');

        // Initialize Quill Editor
        const quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'align': [] }],
                    ['link', 'image'],
                    ['clean']
                ]
            }
        });

        function toggleBookLinks() {
            const type = document.getElementById('contentType').value;
            document.getElementById('book-links-container').style.display = (type === 'book') ? 'block' : 'none';
        }

        if (postId) {
            formTitle.innerText = "Edit Post";
            submitBtn.innerText = "Update Post";
            loadPostData(postId);
        }

        async function loadPostData(id) {
            try {
                const response = await fetch(`https://premium-backend-8plp.onrender.com/admin/content/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const post = await response.json();
                if (post) {
                    document.getElementById('title').value = post.title;
                    document.getElementById('writer').value = post.writer;
                    document.getElementById('contentType').value = post.contenttype;
                    document.getElementById('tags').value = post.tags ? post.tags.join(', ') : '';
                    document.getElementById('isPremium').checked = post.ispremium;
                    quill.root.innerHTML = post.body;
                    
                    if (post.contenttype === 'book' && post.links) {
                        document.getElementById('amazon').value = post.links.amazon || '';
                        document.getElementById('flipkart').value = post.links.flipkart || '';
                        document.getElementById('notion').value = post.links.notion || '';
                        toggleBookLinks();
                    }
                }
            } catch (err) {
                console.error("Error loading post:", err);
            }
        }

        document.getElementById('post-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const writer = document.getElementById('writer').value;
            const contentType = document.getElementById('contentType').value;
            const tags = document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t !== '');
            const isPremium = document.getElementById('isPremium').checked;
            const body = quill.root.innerHTML;

            const links = {};
            if (contentType === 'book') {
                links.amazon = document.getElementById('amazon').value;
                links.flipkart = document.getElementById('flipkart').value;
                links.notion = document.getElementById('notion').value;
            }

            const url = postId ? `https://premium-backend-8plp.onrender.com/admin/content/${postId}` : 'https://premium-backend-8plp.onrender.com/admin/content';
            const method = postId ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ title, writer, contentType, tags, isPremium, body, links })
                });
                const data = await response.json();
                if (data.success) {
                    alert(postId ? "Post updated successfully!" : "Post published successfully!");
                    window.location.href = 'dashboard.html';
                } else {
                    alert("Error: " + data.message);
                }
            } catch (err) {
                alert("Error saving post. Please check your connection.");
            }
        });
    </script>
</body>
</html>
