<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9RLGNJL2ZQ"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-9RLGNJL2ZQ');
    </script>
    
    <title>Category - Anbudan Miththiran</title>
    <meta name="description" id="meta-description" content="Explore Tamil content by category on Anbudan Miththiran.">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="facebook-style.css">
</head>
<body>

    <!-- Facebook Style Header -->
    <header class="fb-header">
        <div class="header-left">
            <a href="index.html" class="fb-logo">A</a>
            <div class="fb-search">
                <i class="fas fa-search" style="color: #65676B;"></i>
                <input type="text" id="search-input" placeholder="Search Anbudan Miththiran">
            </div>
        </div>
        <div class="header-center">
            <a href="index.html" class="nav-item" title="Home"><i class="fas fa-home fa-lg"></i></a>
            <a href="videos.html" class="nav-item" title="Videos"><i class="fas fa-play-circle fa-lg"></i></a>
            <a href="books.html" class="nav-item" title="Books"><i class="fas fa-book fa-lg"></i></a>
            <a href="podcast.html" class="nav-item" title="Podcast"><i class="fas fa-podcast fa-lg"></i></a>
        </div>
        <div class="header-right">
            <a href="about.html" class="profile-link">
                <img src="logo.jpg" alt="Profile" class="profile-pic">
                <span>Miththiran</span>
            </a>
        </div>
    </header>

    <!-- Mobile Navigation -->
    <nav class="mobile-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home fa-lg"></i></a>
        <a href="category.html?type=article" class="nav-item" id="mobile-nav-article"><i class="fas fa-newspaper fa-lg"></i></a>
        <a href="videos.html" class="nav-item"><i class="fas fa-play-circle fa-lg"></i></a>
        <a href="books.html" class="nav-item"><i class="fas fa-book fa-lg"></i></a>
        <a href="about.html" class="nav-item"><i class="fas fa-bars fa-lg"></i></a>
    </nav>

    <main class="fb-main">
        <!-- Left Sidebar -->
        <aside class="fb-sidebar">
            <a href="index.html" class="sidebar-item">
                <div class="sidebar-icon" style="color: #1877F2;"><i class="fas fa-arrow-left"></i></div>
                <span>Back to Feed</span>
            </a>
            <a href="category.html?type=article" class="sidebar-item" id="side-nav-article">
                <div class="sidebar-icon" style="color: #1877F2;"><i class="fas fa-newspaper"></i></div>
                <span>Articles</span>
            </a>
            <a href="category.html?type=poem" class="sidebar-item" id="side-nav-poem">
                <div class="sidebar-icon" style="color: #F02849;"><i class="fas fa-feather-alt"></i></div>
                <span>Poems</span>
            </a>
            <a href="category.html?type=story" class="sidebar-item" id="side-nav-story">
                <div class="sidebar-icon" style="color: #45BD62;"><i class="fas fa-book-open"></i></div>
                <span>Stories</span>
            </a>
            <a href="category.html?type=book" class="sidebar-item" id="side-nav-book">
                <div class="sidebar-icon" style="color: #F02849;"><i class="fas fa-book"></i></div>
                <span>Books</span>
            </a>
        </aside>

        <!-- Main Feed -->
        <section class="fb-feed">
            <div class="fb-card" style="padding: 16px; margin-bottom: 16px;">
                <h1 id="category-title" style="font-size: 24px; font-weight: 700;">Category</h1>
            </div>
            <div id="posts-container">
                <div class="fb-card" style="text-align: center; padding: 40px;">
                    <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--fb-blue);"></i>
                    <p style="margin-top: 10px; color: var(--fb-text-secondary);">Loading content...</p>
                </div>
            </div>
        </section>

        <!-- Right Panel -->
        <aside class="fb-right-panel">
            <div class="fb-card">
                <h3 style="font-size: 17px; color: var(--fb-text-secondary); margin-bottom: 12px;">About</h3>
                <p style="font-size: 14px; color: var(--fb-text-primary);">Explore our collection of Tamil literature by category.</p>
            </div>
        </aside>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'article';
        
        const displayTitle = type.charAt(0).toUpperCase() + type.slice(1) + "s";
        document.getElementById('category-title').innerText = displayTitle;
        document.title = `${displayTitle} - Anbudan Miththiran`;

        // Highlight active nav
        if (document.getElementById(`side-nav-${type}`)) {
            document.getElementById(`side-nav-${type}`).style.background = 'var(--fb-hover)';
            document.getElementById(`side-nav-${type}`).style.fontWeight = '600';
        }

        async function fetchCategoryPosts(query = '') {
            try {
                const url = query 
                    ? `https://premium-backend-8plp.onrender.com/content/public/category/${type}?q=${encodeURIComponent(query)}`
                    : `https://premium-backend-8plp.onrender.com/content/public/category/${type}`;
                
                const response = await fetch(url);
                const posts = await response.json();
                const container = document.getElementById('posts-container');
                container.innerHTML = '';

                if (posts.length === 0) {
                    container.innerHTML = '<div class="fb-card" style="text-align:center; padding: 20px;"><p>No posts found.</p></div>';
                    return;
                }

                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'fb-card';

                    let displayImage = post.contenttype === 'book' ? (post.book_cover_url || post.image_url) : post.image_url;
                    const imageHtml = displayImage ? `<img src="${displayImage}" class="card-image" alt="${post.title}" onerror="this.style.display='none'">` : '';

                    card.innerHTML = `
                        <div class="card-header">
                            <img src="logo.jpg" class="card-author-pic" alt="Miththiran">
                            <div class="card-meta">
                                <h3>${post.writer}</h3>
                                <p>${new Date(post.createdat).toLocaleDateString()} • <i class="fas fa-globe-americas"></i></p>
                            </div>
                        </div>
                        <div class="card-content">
                            <p style="font-weight: 600; font-size: 17px; margin-bottom: 8px;">${post.title}</p>
                            <div style="margin-bottom: 10px;">
                                ${post.tags ? post.tags.map(tag => `<span style="color: #1877F2; margin-right: 5px;">#${tag}</span>`).join('') : ''}
                            </div>
                        </div>
                        ${imageHtml}
                        <div class="card-actions">
                            <a href="post.html?id=${post.id}" class="action-btn">
                                <i class="far fa-eye"></i> Read More
                            </a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error("Error fetching posts:", err);
                document.getElementById('posts-container').innerHTML = '<div class="fb-card" style="text-align:center; padding: 20px;"><p>Error loading content.</p></div>';
            }
        }

        function handleSearch() {
            const query = document.getElementById('search-input').value;
            fetchCategoryPosts(query);
        }

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        fetchCategoryPosts();
    </script>
</body>
</html>
