<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9RLGNJL2ZQ"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-9RLGNJL2ZQ');
    </script>
    
    <title>Post - Anbudan Miththiran</title>
    <meta name="description" id="meta-description" content="Read this post on Anbudan Miththiran.">
    <meta property="og:title" id="og-title" content="Post - Anbudan Miththiran">
    <meta property="og:description" id="og-description" content="Read this post on Anbudan Miththiran.">
    <meta property="og:image" id="og-image" content="logo.jpg">
    <meta property="og:type" content="article">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="facebook-style.css">
    <style>
        .post-container {
            background: var(--fb-white);
            border-radius: 8px;
            box-shadow: var(--fb-card-shadow);
            padding: 24px;
            margin-bottom: 16px;
        }
        .post-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--fb-text-primary);
        }
        .post-body {
            font-size: 17px;
            line-height: 1.6;
            color: var(--fb-text-primary);
        }
        .post-body p {
            margin-bottom: 16px;
        }
        .post-image-full {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .book-links-section {
            background: #f7f8fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 24px;
        }
        .buy-btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .btn-amazon { background: #FF9900; color: white; }
        .btn-flipkart { background: #2874F0; color: white; }
        .btn-notion { background: #1ABC9C; color: white; }
    </style>
</head>
<body>

    <!-- Facebook Style Header -->
    <header class="fb-header">
        <div class="header-left">
            <a href="index.html" class="fb-logo">A</a>
            <div class="fb-search">
                <i class="fas fa-search" style="color: #65676B;"></i>
                <input type="text" id="search-input" placeholder="Search Anbudan Miththiran">
            </div>
        </div>
        <div class="header-center">
            <a href="index.html" class="nav-item" title="Home"><i class="fas fa-home fa-lg"></i></a>
            <a href="videos.html" class="nav-item" title="Videos"><i class="fas fa-play-circle fa-lg"></i></a>
            <a href="books.html" class="nav-item" title="Books"><i class="fas fa-book fa-lg"></i></a>
            <a href="podcast.html" class="nav-item" title="Podcast"><i class="fas fa-podcast fa-lg"></i></a>
        </div>
        <div class="header-right">
            <a href="about.html" class="profile-link">
                <img src="logo.jpg" alt="Profile" class="profile-pic">
                <span>Miththiran</span>
            </a>
        </div>
    </header>

    <!-- Mobile Navigation -->
    <nav class="mobile-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home fa-lg"></i></a>
        <a href="category.html?type=article" class="nav-item"><i class="fas fa-newspaper fa-lg"></i></a>
        <a href="videos.html" class="nav-item"><i class="fas fa-play-circle fa-lg"></i></a>
        <a href="books.html" class="nav-item"><i class="fas fa-book fa-lg"></i></a>
        <a href="about.html" class="nav-item"><i class="fas fa-bars fa-lg"></i></a>
    </nav>

    <main class="fb-main">
        <!-- Left Sidebar -->
        <aside class="fb-sidebar">
            <a href="index.html" class="sidebar-item">
                <div class="sidebar-icon" style="color: #1877F2;"><i class="fas fa-arrow-left"></i></div>
                <span>Back to Feed</span>
            </a>
            <a href="category.html?type=article" class="sidebar-item">
                <div class="sidebar-icon" style="color: #1877F2;"><i class="fas fa-newspaper"></i></div>
                <span>Articles</span>
            </a>
            <a href="category.html?type=poem" class="sidebar-item">
                <div class="sidebar-icon" style="color: #F02849;"><i class="fas fa-feather-alt"></i></div>
                <span>Poems</span>
            </a>
            <a href="category.html?type=story" class="sidebar-item">
                <div class="sidebar-icon" style="color: #45BD62;"><i class="fas fa-book-open"></i></div>
                <span>Stories</span>
            </a>
        </aside>

        <!-- Main Content -->
        <section class="fb-feed">
            <div class="post-container" id="post-content">
                <div style="text-align: center; padding: 40px;">
                    <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--fb-blue);"></i>
                    <p style="margin-top: 10px; color: var(--fb-text-secondary);">Loading post...</p>
                </div>
            </div>
        </section>

        <!-- Right Panel -->
        <aside class="fb-right-panel">
            <div class="fb-card">
                <h3 style="font-size: 17px; color: var(--fb-text-secondary); margin-bottom: 12px;">Share this post</h3>
                <div style="display: flex; gap: 10px;">
                    <button onclick="shareOnFB()" class="action-btn" style="background: #1877F2; color: white;"><i class="fab fa-facebook-f"></i></button>
                    <button onclick="shareOnWA()" class="action-btn" style="background: #25D366; color: white;"><i class="fab fa-whatsapp"></i></button>
                    <button onclick="shareOnTW()" class="action-btn" style="background: #1DA1F2; color: white;"><i class="fab fa-twitter"></i></button>
                </div>
            </div>
        </aside>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        async function fetchPost() {
            if (!postId) {
                document.getElementById('post-content').innerHTML = '<p style="text-align:center;">Post not found.</p>';
                return;
            }

            try {
                const response = await fetch(`https://premium-backend-8plp.onrender.com/content/public/${postId}`);
                const post = await response.json();
                const container = document.getElementById('post-content');

                if (!post || post.success === false) {
                    container.innerHTML = '<h2 style="text-align:center; color: var(--fb-text-primary);">Post not found or is premium.</h2>';
                    return;
                }

                document.title = `${post.title} - Anbudan Miththiran`;
                
                let displayImage = post.contenttype === 'book' ? (post.book_cover_url || post.image_url) : post.image_url;
                const formattedBody = post.body ? post.body.split('\n').filter(p => p.trim() !== '').map(p => `<p>${p}</p>`).join('') : '';
                let imageHtml = displayImage ? `<img src="${displayImage}" class="post-image-full" alt="${post.title}" onerror="this.style.display='none'">` : '';

                let bookLinksHtml = '';
                if (post.contenttype === 'book' && post.links) {
                    bookLinksHtml = `
                        <div class="book-links-section">
                            <h3>Get this book:</h3>
                            <div class="purchase-links">
                                ${post.links.amazon ? `<a href="${post.links.amazon}" target="_blank" class="buy-btn btn-amazon">Amazon</a>` : ''}
                                ${post.links.flipkart ? `<a href="${post.links.flipkart}" target="_blank" class="buy-btn btn-flipkart">Flipkart</a>` : ''}
                                ${post.links.notionpress ? `<a href="${post.links.notionpress}" target="_blank" class="buy-btn btn-notion">Notion Press</a>` : ''}
                            </div>
                        </div>
                    `;
                }

                container.innerHTML = `
                    <div class="card-header" style="margin-bottom: 20px;">
                        <img src="logo.jpg" class="card-author-pic" alt="Miththiran">
                        <div class="card-meta">
                            <h3>${post.writer}</h3>
                            <p>${new Date(post.createdat).toLocaleDateString()} • <i class="fas fa-globe-americas"></i></p>
                        </div>
                    </div>
                    <h1 class="post-title">${post.title}</h1>
                    ${imageHtml}
                    <div class="post-body">${formattedBody}</div>
                    <div style="margin-top: 20px;">
                        ${post.tags ? post.tags.map(tag => `<span style="color: #1877F2; margin-right: 8px;">#${tag}</span>`).join('') : ''}
                    </div>
                    ${bookLinksHtml}
                `;
            } catch (err) {
                console.error("Error fetching post:", err);
                document.getElementById('post-content').innerHTML = '<p style="text-align:center;">Error loading content.</p>';
            }
        }

        function shareOnFB() { window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank'); }
        function shareOnWA() { window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(document.title + ' ' + window.location.href)}`, '_blank'); }
        function shareOnTW() { window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(document.title)}&url=${encodeURIComponent(window.location.href)}`, '_blank'); }

        fetchPost();
    </script>
</body>
</html>
