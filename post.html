<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9RLGNJL2ZQ"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-9RLGNJL2ZQ');
    </script>
    
    <title>Post - Anbudan Miththiran</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="pratilipi-style.css">
</head>
<body>

    <!-- Desktop Header -->
    <header class="app-header">
        <a href="index.html" class="header-brand">Anbudan <span>Miththiran</span></a>
        <nav class="desktop-nav">
            <a href="index.html">Home</a>
            <a href="category.html?type=article">Articles</a>
            <a href="category.html?type=poem">Poems</a>
            <a href="category.html?type=story">Stories</a>
            <a href="videos.html">Videos</a>
            <a href="podcast.html">Podcast</a>
            <a href="books.html">Books</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav">
        <a href="index.html" class="mobile-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="category.html?type=article" class="mobile-nav-item">
            <i class="fas fa-newspaper"></i>
            <span>Articles</span>
        </a>
        <a href="videos.html" class="mobile-nav-item">
            <i class="fas fa-play-circle"></i>
            <span>Videos</span>
        </a>
        <a href="books.html" class="mobile-nav-item">
            <i class="fas fa-book"></i>
            <span>Books</span>
        </a>
        <a href="about.html" class="mobile-nav-item">
            <i class="fas fa-user"></i>
            <span>About</span>
        </a>
    </nav>

    <main class="container">
        <article class="post-detail" id="post-content">
            <div style="text-align: center; padding: 50px;">
                <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary-color);"></i>
                <p style="margin-top: 10px; color: var(--gray-dark);">Loading post...</p>
            </div>
        </article>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        async function fetchPost() {
            if (!postId) {
                document.getElementById('post-content').innerHTML = '<p style="text-align:center;">Post not found.</p>';
                return;
            }

            try {
                const response = await fetch(`https://premium-backend-8plp.onrender.com/content/public/${postId}`);
                const post = await response.json();
                const container = document.getElementById('post-content');

                if (!post || post.success === false) {
                    container.innerHTML = '<h2 style="text-align:center;">Post not found or is premium.</h2>';
                    return;
                }

                document.title = `${post.title} - Anbudan Miththiran`;
                
                let displayImage = post.contenttype === 'book' ? (post.book_cover_url || post.image_url) : post.image_url;
                const formattedBody = post.body ? post.body.split('\n').filter(p => p.trim() !== '').map(p => `<p>${p}</p>`).join('') : '';
                let imageHtml = displayImage ? `<img src="${displayImage}" style="width:100%; border-radius:12px; margin-bottom:25px;" alt="${post.title}" onerror="this.style.display='none'">` : '';

                let bookLinksHtml = '';
                if (post.contenttype === 'book' && post.links) {
                    bookLinksHtml = `
                        <div style="background: var(--gray-light); padding: 20px; border-radius: 12px; margin-top: 30px;">
                            <h3 style="margin-bottom:15px;">Get this book:</h3>
                            <div style="display:flex; flex-wrap:wrap; gap:10px;">
                                ${post.links.amazon ? `<a href="${post.links.amazon}" target="_blank" style="background:#FF9900; color:white; padding:10px 20px; border-radius:8px; text-decoration:none; font-weight:600;">Amazon</a>` : ''}
                                ${post.links.flipkart ? `<a href="${post.links.flipkart}" target="_blank" style="background:#2874F0; color:white; padding:10px 20px; border-radius:8px; text-decoration:none; font-weight:600;">Flipkart</a>` : ''}
                                ${post.links.notionpress ? `<a href="${post.links.notionpress}" target="_blank" style="background:#1ABC9C; color:white; padding:10px 20px; border-radius:8px; text-decoration:none; font-weight:600;">Notion Press</a>` : ''}
                            </div>
                        </div>
                    `;
                }

                const shareUrl = window.location.href;
                const shareText = encodeURIComponent(post.title);

                container.innerHTML = `
                    <header class="post-header">
                        <div class="story-category">${post.contenttype || 'Literature'}</div>
                        <h1>${post.title}</h1>
                        <div class="post-author-info">
                            <img src="logo.jpg" class="post-author-img" alt="Miththiran">
                            <span>By ${post.writer} • ${new Date(post.createdat).toLocaleDateString()}</span>
                        </div>
                    </header>
                    
                    ${imageHtml}
                    
                    <div class="post-content">
                        ${formattedBody}
                    </div>

                    <div style="margin-top: 20px;">
                        ${post.tags ? post.tags.map(tag => `<span style="color: var(--primary-color); margin-right: 10px; font-weight:500;">#${tag}</span>`).join('') : ''}
                    </div>

                    ${bookLinksHtml}

                    <footer class="post-footer">
                        <div class="share-section">
                            <h3>Share this with your friends</h3>
                            <div class="share-buttons-large">
                                <a href="https://api.whatsapp.com/send?text=${shareText}%20${encodeURIComponent(shareUrl)}" target="_blank" class="share-icon-btn bg-whatsapp"><i class="fab fa-whatsapp"></i></a>
                                <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}" target="_blank" class="share-icon-btn bg-facebook"><i class="fab fa-facebook-f"></i></a>
                                <a href="https://twitter.com/intent/tweet?text=${shareText}&url=${encodeURIComponent(shareUrl)}" target="_blank" class="share-icon-btn bg-twitter"><i class="fab fa-twitter"></i></a>
                                <button onclick="copyToClipboard('${shareUrl}')" class="share-icon-btn bg-copy"><i class="fas fa-link"></i></button>
                            </div>
                        </div>
                    </footer>
                `;
            } catch (err) {
                console.error("Error fetching post:", err);
                document.getElementById('post-content').innerHTML = '<p style="text-align:center;">Error loading content.</p>';
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Link copied to clipboard!');
            });
        }

        fetchPost();
    </script>
</body>
</html>
