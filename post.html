<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - Anbudan Miththiran</title>
    <meta property="og:title" content="Post - Anbudan Miththiran" id="og-title">
    <meta property="og:type" content="article">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { min-height: 100vh; background: linear-gradient(135deg, #fff4e6, #ffd8a8, #ffb703); color: #3a2c1a; }
        nav { display: flex; justify-content: flex-end; gap: 18px; padding: 18px 25px; background: rgba(255, 255, 255, 0.95); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
        nav a { text-decoration: none; font-size: 0.9rem; color: #5a3a1a; font-weight: 500; transition: all 0.3s ease; }
        nav a:hover { color: #ff9f1c; text-decoration: underline; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: #ff9f1c; text-decoration: none; font-weight: 600; margin-bottom: 24px; transition: all 0.3s ease; }
        .back-link:hover { gap: 12px; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .post-header { margin-bottom: 40px; text-align: center; }
        .post-title { font-size: 2.5rem; font-weight: 700; color: #3a2c1a; margin-bottom: 16px; line-height: 1.2; }
        .post-meta { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; font-size: 0.95rem; color: #666; }
        .meta-item { display: flex; align-items: center; gap: 6px; }
        .badge { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-type { background: #E3F2FD; color: #1976D2; }
        .badge-free { background: #E8F5E9; color: #2E7D32; }
        .badge-premium { background: #FFF3E0; color: #E65100; }
        .post-content { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1); line-height: 1.8; font-size: 1.05rem; color: #3a2c1a; margin-bottom: 40px; }
        .post-content p { margin-bottom: 16px; }
        .share-container { margin-top: 40px; padding-top: 24px; border-top: 2px solid #f0f0f0; text-align: center; }
        .share-container h4 { margin-bottom: 16px; color: #5a3a1a; font-size: 1.1rem; }
        .share-buttons { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .share-btn { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; font-size: 0.9rem; font-weight: 600; color: white; transition: transform 0.2s ease, opacity 0.2s ease; display: flex; align-items: center; gap: 6px; }
        .share-btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-whatsapp { background: #25D366; }
        .btn-facebook { background: #1877F2; }
        .btn-twitter { background: #000000; }
        .btn-native { background: #ff9f1c; }
        .premium-lock { background: linear-gradient(135deg, #FFF9E6 0%, #FFF3E0 100%); border: 2px solid #FFB74D; border-radius: 12px; padding: 40px; text-align: center; margin: 40px 0; }
        .lock-icon { font-size: 3rem; margin-bottom: 16px; }
        .premium-lock h3 { color: #E65100; font-size: 1.5rem; margin-bottom: 12px; }
        .btn { display: inline-block; padding: 12px 28px; border-radius: 25px; background: #ff9f1c; color: white; text-decoration: none; font-weight: 600; transition: all 0.3s ease; border: none; cursor: pointer; font-size: 1rem; }
        .btn:hover { background: #e8890c; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 159, 28, 0.3); }
        .btn-secondary { background: #B8D4E0; color: #1A3A4A; }
        .loading { text-align: center; padding: 60px 20px; color: #666; }
        .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: #ff9f1c; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-state { background: white; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1); }
        .error-icon { font-size: 3rem; margin-bottom: 16px; }
        footer { text-align: center; padding: 20px; font-size: 0.8rem; opacity: 0.7; margin-top: 40px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); }
        .modal-content { background-color: white; margin: 10% auto; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #B8D4E0; border-radius: 8px; margin-bottom: 15px; margin-top: 5px; }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
        @media (max-width: 600px) { .post-title { font-size: 1.8rem; } .post-content { padding: 24px; } .share-btn { width: 100%; justify-content: center; } }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="index.html#latest">Latest Posts</a>
    </nav>

    <div class="container">
        <a href="index.html" class="back-link">← Back to Home</a>
        <div id="loading" class="loading"><div class="spinner"></div><p>Loading content...</p></div>
        <div id="content"></div>
        <div id="error" class="error-state" style="display: none;">
            <div class="error-icon">⚠️</div>
            <h2>Content Not Found</h2>
            <p>The content you're looking for doesn't exist or has been removed.</p>
            <a href="index.html" class="btn">Back to Home</a>
        </div>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2>Premium Content</h2>
            <p style="margin: 10px 0 20px; color: #666;">This is premium content. Please log in to access it.</p>
            <form id="authForm">
                <div class="form-group"><label>Email</label><input type="email" id="authEmail" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="authPassword" required></div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeAuthModal()">Cancel</button>
                    <button type="submit" class="btn">Login</button>
                </div>
            </form>
        </div>
    </div>

    <footer>© 2026 Anbudan Miththiran</footer>

    <script>
        const API = "https://premium-backend-8plp.onrender.com";
        let contentData = null;

        function getPostId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        async function loadContent() {
            const postId = getPostId();
            const loadingDiv = document.getElementById("loading");
            const errorDiv = document.getElementById("error");

            if (!postId) {
                loadingDiv.style.display = "none";
                errorDiv.style.display = "block";
                return;
            }

            try {
                const response = await fetch(API + "/content/" + postId);
                if (!response.ok) throw new Error("Content not found");

                contentData = await response.json();
                loadingDiv.style.display = "none";

                if (contentData.isPremium === 1 && !localStorage.getItem("token")) {
                    showPremiumLock();
                    return;
                }

                displayContent(contentData);
            } catch (error) {
                loadingDiv.style.display = "none";
                errorDiv.style.display = "block";
            }
        }

        function displayContent(data) {
            const fullTitle = data.title + " - Anbudan Miththiran";
            document.title = fullTitle;
            document.getElementById('og-title').setAttribute('content', fullTitle);
            
            const contentDiv = document.getElementById("content");
            const typeLabel = data.contentType ? data.contentType.charAt(0).toUpperCase() + data.contentType.slice(1) : "Article";
            const badgeClass = data.isPremium === 1 ? "badge-premium" : "badge-free";
            const typeText = data.isPremium === 1 ? "Premium" : "Free";
            const createdDate = new Date(data.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            const safeTitle = data.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');

            contentDiv.innerHTML = `
                <div class="post-header">
                    <h1 class="post-title">${escapeHtml(data.title)}</h1>
                    <div class="post-meta">
                        <span class="meta-item"><span class="badge badge-type">${typeLabel}</span></span>
                        <span class="meta-item"><span class="badge ${badgeClass}">${typeText}</span></span>
                        <span class="meta-item">📅 ${createdDate}</span>
                    </div>
                </div>
                <div class="post-content">
                    ${formatContent(data.body)}
                    <div class="share-container">
                        <h4>Share this post:</h4>
                        <div class="share-buttons">
                            <button class="share-btn btn-whatsapp" onclick="shareSocial('whatsapp', '${safeTitle}')">WhatsApp</button>
                            <button class="share-btn btn-twitter" onclick="shareSocial('twitter', '${safeTitle}')">X (Twitter)</button>
                            <button class="share-btn btn-facebook" onclick="shareSocial('facebook', '${safeTitle}')">Facebook</button>
                            <button class="share-btn btn-native" onclick="nativeShare('${safeTitle}')">Share...</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function shareSocial(platform, title) {
            const currentUrl = encodeURIComponent(window.location.href);
            const encodedTitle = encodeURIComponent(title + " - Anbudan Miththiran");
            let shareUrl = "";

            if (platform === 'whatsapp') shareUrl = `https://api.whatsapp.com/send?text=${encodedTitle}%20${currentUrl}`;
            else if (platform === 'twitter') shareUrl = `https://twitter.com/intent/tweet?text=${encodedTitle}&url=${currentUrl}`;
            else if (platform === 'facebook') shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${currentUrl}`;
            
            if (shareUrl) window.open(shareUrl, '_blank', 'width=600,height=400');
        }

        async function nativeShare(title) {
            const currentUrl = window.location.href;
            const fullTitle = title + " - Anbudan Miththiran";
            if (navigator.share) {
                try { await navigator.share({ title: fullTitle, text: 'Check out this post: ' + fullTitle, url: currentUrl }); } 
                catch (err) { console.log('User cancelled or error sharing'); }
            } else {
                navigator.clipboard.writeText(currentUrl).then(() => alert('Link copied to clipboard!'));
            }
        }

        function showPremiumLock() {
            document.getElementById("content").innerHTML = `
                <div class="premium-lock">
                    <div class="lock-icon">🔒</div>
                    <h3>Premium Content</h3>
                    <p>This content is exclusive to premium members. Please log in to access it.</p>
                    <button class="btn" onclick="openAuthModal()">Login to View</button>
                </div>
            `;
        }

        function formatContent(text) { return text.split('\n\n').map(para => `<p>${escapeHtml(para).replace(/\n/g, '<br>')}</p>`).join(''); }
        function escapeHtml(text) { const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }; return text.replace(/[&<>"']/g, m => map[m]); }
        function openAuthModal() { document.getElementById("authModal").style.display = "block"; }
        function closeAuthModal() { document.getElementById("authModal").style.display = "none"; }

        document.getElementById("authForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("authEmail").value;
            const password = document.getElementById("authPassword").value;

            try {
                const response = await fetch(API + "/admin-login", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem("token", data.token);
                    closeAuthModal();
                    displayContent(contentData);
                } else { alert("Invalid email or password"); }
            } catch (error) { alert("Login failed. Please try again."); }
        });

        window.onclick = function(event) {
            const modal = document.getElementById("authModal");
            if (event.target == modal) modal.style.display = "none";
        }
        window.addEventListener("load", loadContent);
    </script>
</body>
            </html>
