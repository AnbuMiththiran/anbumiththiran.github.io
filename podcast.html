<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9RLGNJL2ZQ"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-9RLGNJL2ZQ');
    </script>
    
    <title>Podcast - Anbudan Miththiran</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="pratilipi-style.css">
    <style>
        .podcast-card {
            background: var(--bg-white);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
        }
        .podcast-thumbnail {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .podcast-info {
            padding: 20px;
        }
        .podcast-info h3 {
            font-size: 1.2rem;
            color: var(--primary-dark);
            margin-bottom: 10px;
        }
        .audio-player {
            background: var(--gray-light);
            padding: 15px;
            border-radius: 0 0 var(--border-radius) var(--border-radius);
        }
        audio {
            width: 100%;
            height: 35px;
        }
        .spotify-link {
            background: #1DB954;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <!-- Desktop Header -->
    <header class="app-header">
        <a href="index.html" class="header-brand">Anbudan <span>Miththiran</span></a>
        <nav class="desktop-nav">
            <a href="index.html">Home</a>
            <a href="category.html?type=article">Articles</a>
            <a href="category.html?type=poem">Poems</a>
            <a href="category.html?type=story">Stories</a>
            <a href="videos.html">Videos</a>
            <a href="podcast.html" class="active">Podcast</a>
            <a href="books.html">Books</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav">
        <a href="index.html" class="mobile-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="category.html?type=article" class="mobile-nav-item">
            <i class="fas fa-newspaper"></i>
            <span>Articles</span>
        </a>
        <a href="videos.html" class="mobile-nav-item">
            <i class="fas fa-play-circle"></i>
            <span>Videos</span>
        </a>
        <a href="books.html" class="mobile-nav-item">
            <i class="fas fa-book"></i>
            <span>Books</span>
        </a>
        <a href="about.html" class="mobile-nav-item">
            <i class="fas fa-user"></i>
            <span>About</span>
        </a>
    </nav>

    <main class="container">
        <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
            <h1 style="font-size: 1.8rem; color: var(--primary-dark);">Podcast Episodes</h1>
            <a href="https://open.spotify.com/show/5uMIWUWtjb0jkggHoEG6nl" target="_blank" class="spotify-link">
                <i class="fab fa-spotify"></i> Listen on Spotify
            </a>
        </div>

        <div id="podcast-container">
            <div style="text-align: center; padding: 50px;">
                <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary-color);"></i>
                <p style="margin-top: 10px; color: var(--gray-dark);">Loading episodes...</p>
            </div>
        </div>
    </main>

    <script>
        fetch("podcast-data.json")
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById("podcast-container");
            container.innerHTML = '';

            if(!data || !data.items || data.items.length === 0) {
                container.innerHTML = `<p>No episodes available.</p>`;
                return;
            }

            data.items.forEach(item => {
                const card = document.createElement("div");
                card.className = "podcast-card";
                card.innerHTML = `
                    <img src="${item.thumbnail || data.feed.image}" class="podcast-thumbnail" alt="Thumbnail">
                    <div class="podcast-info">
                        <div class="story-category">Podcast Episode</div>
                        <h3>${item.title}</h3>
                        <div class="story-meta">
                            <span><i class="far fa-calendar"></i> ${new Date(item.pubDate || Date.now()).toLocaleDateString()}</span>
                        </div>
                    </div>
                    <div class="audio-player">
                        <audio controls>
                            <source src="${item.enclosure.link}" type="audio/mpeg">
                            Your browser does not support the audio element.
                        </audio>
                    </div>
                    <div class="story-actions">
                        <div class="share-group" style="margin-left: auto;">
                            <i class="fas fa-share-alt share-btn" onclick="sharePodcast('${item.title.replace(/'/g, "\\'")}', '${item.link}')" title="Share"></i>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        })
        .catch(error => {
            console.log("RSS Load Error:", error);
            document.getElementById("podcast-container").innerHTML = '<p>Error loading podcast data.</p>';
        });

        function sharePodcast(title, link) {
            if (navigator.share) {
                navigator.share({ title: title, url: link });
            } else {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(title + ' ' + link)}`, '_blank');
            }
        }
    </script>
</body>
</html>
