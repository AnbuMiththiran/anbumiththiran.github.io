<title>Podcast | Anbudan Miththiran</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#fff4e6,#ffd8a8,#ffb703);
    color:#3a2c1a;
}

nav{
    display:flex;
    justify-content:flex-end;
    gap:18px;
    padding:18px 25px;
}

nav a{
    text-decoration:none;
    font-size:0.9rem;
    color:#5a3a1a;
    font-weight:500;
}

nav a:hover{
    text-decoration:underline;
}

.header{
    text-align:center;
    margin:30px auto 10px;
}

.header h1{
    font-size:2.3rem;
}

.podcasts{
    max-width:1000px;
    margin:30px auto;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:22px;
}

.podcast-card{
    background:#fff;
    border-radius:16px;
    padding:14px;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
    transition:.3s;
}

.podcast-card:hover{
    transform:translateY(-4px);
}

.podcast-card iframe{
    width:100%;
    height:352px;
    border:none;
    border-radius:12px;
}

.podcast-info{
    text-align:left;
    margin-top:10px;
}

.podcast-info h3{
    font-size:1rem;
    margin-bottom:4px;
}

.podcast-info span{
    font-size:12px;
    opacity:.7;
}

footer{
    text-align:center;
    padding:25px;
    font-size:.8rem;
    opacity:.7;
}

.loading{
    text-align:center;
    font-size:1rem;
    margin-top:30px;
}

@media(max-width:600px){
    nav{
        justify-content:center;
        flex-wrap:wrap;
    }
    .podcast-card iframe{
        height:300px;
    }
}
</style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="podcast.html">Podcast</a>
    <a href="videos.html">Videos</a>

    <a href="about.html">About</a>
</nav>

<section class="header">
    <h1>🎙 Podcast Episodes</h1>
</section>

<section class="podcasts" id="podcast-container">
    <div class="loading">Loading latest episodes...</div>
</section>

<footer>
    © 2026 Anbudan Miththiran
</footer>

<script>
const rssFeed = "https://anchor.fm/s/b9b6984c/podcast/rss";
const container = document.getElementById("podcast-container");

// Use CORS proxy
fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(rssFeed))
.then(response => response.text())
.then(str => new window.DOMParser().parseFromString(str, "text/xml"))
.then(data => {

    const items = data.querySelectorAll("item");
    container.innerHTML = "";

    items.forEach((el, index) => {

        const title = el.querySelector("title").textContent;
        const pubDate = new Date(el.querySelector("pubDate").textContent);
        const enclosure = el.querySelector("enclosure");
        const audioUrl = enclosure ? enclosure.getAttribute("url") : "";

        const formattedDate = pubDate.toLocaleDateString("en-US", {
            year: "numeric",
            month: "long",
            day: "numeric"
        });

        const card = document.createElement("div");
        card.className = "podcast-card";

        card.innerHTML = `
            <iframe 
                src="https://open.spotify.com/embed/episode/${extractSpotifyId(el)}"
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
            </iframe>
            <div class="podcast-info">
                <h3>${title}</h3>
                <span>${formattedDate}</span>
            </div>
        `;

        container.appendChild(card);
    });
})
.catch(err => {
    container.innerHTML = "<div class='loading'>Unable to load episodes.</div>";
    console.error(err);
});

function extractSpotifyId(item){
    const link = item.querySelector("link").textContent;
    const parts = link.split("/");
    return parts[parts.length - 1];
}
</script>

</body>
</html>
