<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google tag -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9RLGNJL2ZQ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-9RLGNJL2ZQ');

<title>Podcast | Anbudan Miththiran</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#fff4e6,#ffd8a8,#ffb703);
    color:#3a2c1a;
}

/* NAV */
nav{
    display:flex;
    justify-content:flex-end;
    gap:18px;
    padding:18px 25px;
}

nav a{
    text-decoration:none;
    font-size:0.9rem;
    color:#5a3a1a;
    font-weight:500;
}

nav a:hover{
    text-decoration:underline;
}

/* HEADER */
.header{
    text-align:center;
    margin:30px auto 10px;
}

.header h1{
    font-size:2.3rem;
}

/* PODCAST GRID */
.podcasts{
    max-width:1000px;
    margin:30px auto;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:22px;
}

.podcast-card{
    background:#fff;
    border-radius:16px;
    padding:18px;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
    transition:.3s;
}

.podcast-card:hover{
    transform:translateY(-4px);
}

.podcast-card h3{
    font-size:1rem;
    margin-bottom:8px;
}

.podcast-card span{
    font-size:12px;
    opacity:.7;
}

.podcast-card p{
    font-size:13px;
    margin:10px 0;
    line-height:1.4;
    opacity:.8;
}

.listen-btn{
    display:inline-block;
    margin-top:10px;
    padding:8px 14px;
    background:#1db954;
    color:#fff;
    border-radius:8px;
    text-decoration:none;
    font-size:13px;
    transition:.2s;
}

.listen-btn:hover{
    opacity:.8;
}

/* FOOTER */
footer{
    text-align:center;
    padding:25px;
    font-size:.8rem;
    opacity:.7;
}

/* MOBILE */
@media(max-width:600px){
    nav{
        justify-content:center;
        flex-wrap:wrap;
    }
}
</style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="podcast.html">Podcast</a>
    <a href="videos.html">Videos</a>
    <a href="writings/index.html">Writings</a>
    <a href="about.html">About</a>
</nav>

<section class="header">
    <h1>🎙 Podcast Episodes</h1>
</section>

<section class="podcasts">
    <div id="podcast-container">Loading episodes...</div>
</section>

<footer>
    © 2026 Anbudan Miththiran
</footer>

<script>
const rssFeed = "https://anchor.fm/s/b9b6984c/podcast/rss";
const proxy = "https://api.allorigins.win/raw?url=";

fetch(proxy + encodeURIComponent(rssFeed))
  .then(response => response.text())
  .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
  .then(data => {

    const items = data.querySelectorAll("item");
    const container = document.getElementById("podcast-container");
    container.innerHTML = "";

    let count = 0;

    items.forEach(item => {
      if(count >= 6) return;

      const title = item.querySelector("title").textContent;
      const pubDate = new Date(item.querySelector("pubDate").textContent)
                        .toDateString();
      const link = item.querySelector("link").textContent;
      const description = item.querySelector("description").textContent
                            .replace(/<[^>]*>/g, "")
                            .substring(0, 150) + "...";

      const card = document.createElement("div");
      card.className = "podcast-card";

      card.innerHTML = `
          <h3>${title}</h3>
          <span>${pubDate}</span>
          <p>${description}</p>
          <a class="listen-btn" href="${link}" target="_blank">
              🎧 Listen on Spotify
          </a>
      `;

      container.appendChild(card);
      count++;
    });
  })
  .catch(err => {
    document.getElementById("podcast-container").innerHTML =
      "Unable to load episodes.";
    console.error(err);
  });
</script>

</body>
</html>
