<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9RLGNJL2ZQ"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-9RLGNJL2ZQ');
    </script>
    
    <title>Podcast - Anbudan Miththiran</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="facebook-style.css">
    <style>
        .podcast-card-fb {
            background: var(--fb-white);
            border-radius: 8px;
            box-shadow: var(--fb-card-shadow);
            margin-bottom: 16px;
            overflow: hidden;
        }
        .podcast-header {
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .podcast-body {
            padding: 0 12px 12px 12px;
        }
        .podcast-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-bottom: 1px solid var(--fb-divider);
        }
        .audio-player-container {
            padding: 12px;
            background: #f0f2f5;
        }
        audio {
            width: 100%;
            height: 40px;
        }
        .spotify-btn {
            background: #1DB954;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
        }
    </style>
</head>
<body>

    <!-- Facebook Style Header -->
    <header class="fb-header">
        <div class="header-left">
            <a href="index.html" class="fb-logo">A</a>
            <div class="fb-search">
                <i class="fas fa-search" style="color: #65676B;"></i>
                <input type="text" id="search-input" placeholder="Search Anbudan Miththiran">
            </div>
        </div>
        <div class="header-center">
            <a href="index.html" class="nav-item" title="Home"><i class="fas fa-home fa-lg"></i></a>
            <a href="videos.html" class="nav-item" title="Videos"><i class="fas fa-play-circle fa-lg"></i></a>
            <a href="books.html" class="nav-item" title="Books"><i class="fas fa-book fa-lg"></i></a>
            <a href="podcast.html" class="nav-item active" title="Podcast"><i class="fas fa-podcast fa-lg"></i></a>
        </div>
        <div class="header-right">
            <a href="about.html" class="profile-link">
                <img src="logo.jpg" alt="Profile" class="profile-pic">
                <span>Miththiran</span>
            </a>
        </div>
    </header>

    <!-- Mobile Navigation -->
    <nav class="mobile-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home fa-lg"></i></a>
        <a href="category.html?type=article" class="nav-item"><i class="fas fa-newspaper fa-lg"></i></a>
        <a href="videos.html" class="nav-item"><i class="fas fa-play-circle fa-lg"></i></a>
        <a href="books.html" class="nav-item"><i class="fas fa-book fa-lg"></i></a>
        <a href="about.html" class="nav-item"><i class="fas fa-bars fa-lg"></i></a>
    </nav>

    <main class="fb-main">
        <!-- Left Sidebar -->
        <aside class="fb-sidebar">
            <a href="index.html" class="sidebar-item">
                <div class="sidebar-icon" style="color: #1877F2;"><i class="fas fa-arrow-left"></i></div>
                <span>Back to Feed</span>
            </a>
            <a href="podcast.html" class="sidebar-item" style="background: var(--fb-hover); font-weight: 600;">
                <div class="sidebar-icon" style="color: #F7B928;"><i class="fas fa-microphone"></i></div>
                <span>All Episodes</span>
            </a>
        </aside>

        <!-- Main Feed -->
        <section class="fb-feed">
            <div class="fb-card" style="padding: 16px; margin-bottom: 16px;">
                <h1 style="font-size: 24px; font-weight: 700;">Podcast Episodes</h1>
                <p style="color: var(--fb-text-secondary); margin-top: 4px;">Life • Philosophy • Society • Self Awakening</p>
            </div>

            <div id="podcast-container">
                <div class="fb-card" style="text-align: center; padding: 40px;">
                    <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--fb-blue);"></i>
                    <p style="margin-top: 10px; color: var(--fb-text-secondary);">Loading episodes...</p>
                </div>
            </div>
        </section>

        <!-- Right Panel -->
        <aside class="fb-right-panel">
            <div class="fb-card">
                <h3 style="font-size: 17px; color: var(--fb-text-secondary); margin-bottom: 12px;">Listen on Spotify</h3>
                <p style="font-size: 14px; color: var(--fb-text-primary);">Get the full experience on Spotify.</p>
                <a href="https://open.spotify.com/show/5uMIWUWtjb0jkggHoEG6nl" target="_blank" class="spotify-btn">
                    <i class="fab fa-spotify"></i> Spotify
                </a>
            </div>
        </aside>
    </main>

    <script>
        fetch("podcast-data.json")
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById("podcast-container");
            container.innerHTML = '';

            if(!data || !data.items || data.items.length === 0) {
                container.innerHTML = `<div class="fb-card" style="padding: 20px;"><p>No episodes available.</p></div>`;
                return;
            }

            data.items.forEach(item => {
                const card = document.createElement("div");
                card.className = "podcast-card-fb";
                card.innerHTML = `
                    <div class="podcast-header">
                        <img src="logo.jpg" class="card-author-pic" alt="Miththiran">
                        <div class="card-meta">
                            <h3>Anbudan Miththiran</h3>
                            <p>${new Date(item.pubDate || Date.now()).toLocaleDateString()} • <i class="fas fa-globe-americas"></i></p>
                        </div>
                    </div>
                    <div class="podcast-body">
                        <p style="font-weight: 600; font-size: 17px; margin-bottom: 8px;">${item.title}</p>
                    </div>
                    <img src="${item.thumbnail || data.feed.image}" class="podcast-image" alt="Thumbnail">
                    <div class="audio-player-container">
                        <audio controls>
                            <source src="${item.enclosure.link}" type="audio/mpeg">
                            Your browser does not support the audio element.
                        </audio>
                    </div>
                    <div class="card-actions">
                        <button class="action-btn" onclick="sharePodcast('${item.title.replace(/'/g, "\\'")}', '${item.link}')">
                            <i class="far fa-share-square"></i> Share
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        })
        .catch(error => {
            console.log("RSS Load Error:", error);
            document.getElementById("podcast-container").innerHTML = '<div class="fb-card" style="padding: 20px;"><p>Error loading podcast data.</p></div>';
        });

        function sharePodcast(title, link) {
            if (navigator.share) {
                navigator.share({ title: title, url: link });
            } else {
                alert('Link: ' + link);
            }
        }
    </script>
</body>
</html>
