<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#fff4e6,#ffd8a8,#ffb703);
    color:#3a2c1a;
}

nav{
    display:flex;
    justify-content:flex-end;
    gap:18px;
    padding:18px 25px;
}

nav a{
    text-decoration:none;
    font-size:0.9rem;
    color:#5a3a1a;
    font-weight:500;
}

nav a:hover{
    text-decoration:underline;
}

.header{
    text-align:center;
    margin:30px auto 10px;
}

.header h1{
    font-size:2.3rem;
}

.podcasts{
    max-width:1000px;
    margin:30px auto;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:22px;
}

.podcast-card{
    background:#fff;
    border-radius:16px;
    padding:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
    transition:.3s;
}

.podcast-card:hover{
    transform:translateY(-4px);
}

.podcast-thumb{
    width:100%;
    border-radius:12px;
    margin-bottom:10px;
}

.podcast-info h3{
    font-size:1rem;
    margin-bottom:6px;
}

.podcast-info span{
    font-size:12px;
    opacity:.7;
}

audio{
    width:100%;
    margin-top:10px;
}

footer{
    text-align:center;
    padding:25px;
    font-size:.8rem;
    opacity:.7;
}

.loading{
    text-align:center;
    font-size:1rem;
    margin-top:30px;
}
</style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="podcast.html">Podcast</a>
    <a href="videos.html">Videos</a>
    <a href="writings/index.html">Writings</a>
    <a href="about.html">About</a>
</nav>

<section class="header">
    <h1>🎙 Podcast Episodes</h1>
</section>

<section class="podcasts" id="podcast-container">
    <div class="loading">Loading latest episodes...</div>
</section>

<footer>
    © 2026 Anbudan Miththiran
</footer>

<script>
fetch("podcast-data.json")
.then(response => response.json())
.then(data => {

    const container = document.getElementById("podcast-container");
    container.innerHTML = "";

    data.items.slice(0,6).forEach(item => {

        const title = item.title;

        const date = new Date(item.pubDate).toLocaleDateString("en-US", {
            year: "numeric",
            month: "long",
            day: "numeric"
        });

        const audioUrl = item.enclosure.link;
        const thumbnail = item.thumbnail || data.feed.image;

        const card = document.createElement("div");
        card.className = "podcast-card";

        card.innerHTML = `
            <img class="podcast-thumb" src="${thumbnail}" alt="Podcast Thumbnail">
            <div class="podcast-info">
                <h3>${title}</h3>
                <span>${date}</span>
            </div>
            <audio controls>
                <source src="${audioUrl}" type="audio/mpeg">
            </audio>
        `;

        container.appendChild(card);
    });

})
.catch(error => {
    document.getElementById("podcast-container").innerHTML =
        "<div class='loading'>Unable to load episodes.</div>";
    console.error(error);
});
</script>

<script>
function trackAudio(player){

if(player.dataset.tracked) return;
player.dataset.tracked = "true";

// PLAY
player.addEventListener("play", function(){
gtag('event','podcast_play',{
podcast_src: player.currentSrc
});
});

// PAUSE
player.addEventListener("pause", function(){
gtag('event','podcast_pause',{
podcast_src: player.currentSrc
});
});

// COMPLETE
player.addEventListener("ended", function(){
gtag('event','podcast_complete',{
podcast_src: player.currentSrc
});
});

// PROGRESS TRACKING
let marks=[25,50,75];
let done=[];

player.addEventListener("timeupdate",function(){

if(!player.duration) return;

let percent=(player.currentTime/player.duration)*100;

marks.forEach(function(m){
if(percent>=m && !done.includes(m)){
done.push(m);

gtag('event','podcast_progress',{
progress:m,
podcast_src:player.currentSrc
});
}
});

});

}


// Detect dynamically added audio players
const observer=new MutationObserver(function(){

document.querySelectorAll("audio").forEach(trackAudio);

});

observer.observe(document.body,{
childList:true,
subtree:true
});

// Track already existing players
document.querySelectorAll("audio").forEach(trackAudio);

</script>

</body>
