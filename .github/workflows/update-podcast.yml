name: Update Podcast JSON

on:
  schedule:
    - cron: '0 */12 * * *'   # runs every 12 hours
  workflow_dispatch:         # allows manual run

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch RSS and convert to JSON
        run: |
          curl "https://api.rss2json.com/v1/api.json?rss_url=https://anchor.fm/s/b9b6984c/podcast/rss" -o podcast-data.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add podcast-data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update podcast JSON"
          git push
