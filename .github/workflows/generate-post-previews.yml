name: Generate Post Previews

on:
  push:
    branches: [main]
    paths-ignore:
      - 'p/**'   # avoid infinite loop: don't re-trigger on its own commits
  schedule:
    - cron: '0 */6 * * *'   # refresh previews every 6 hours in case posts change
  workflow_dispatch:        # allows manual run from the Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate static post preview pages
        run: node scripts/generate-post-previews.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add p/ sitemap.xml
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generate post preview pages"
          git push
